<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Popbox Music Chat - YouTube Tarzı Gelişmiş Tema</title>
    <!-- FIREBASE SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <style>
        /* MEVCUT CSS KODLARI AYNEN KALACAK - SADECE WEBRTC EKLENECEK */
        /* (Tüm CSS kodları aynen kalıyor, sadece JS kısmı değişiyor) */
        
        /* Video Call Styles - WebRTC için ek stiller */
        .video-call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .video-call-container {
            width: 100%;
            max-width: 1200px;
            height: 90%;
            padding: 20px;
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }
        
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            min-height: 0;
        }
        
        .video-container-local, .video-container-remote {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--video-call);
            box-shadow: 0 8px 16px rgba(62, 166, 255, 0.3);
        }
        
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 200px;
            max-height: 400px;
        }
        
        .video-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            border: 1px solid var(--border-color);
        }
        
        .call-controls {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            border-top: 1px solid var(--border-color);
        }
        
        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--text-primary);
            backdrop-filter: blur(5px);
        }
        
        .call-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--video-call);
        }
        
        .call-btn.end-call {
            background: var(--ban-bg);
            color: var(--ban);
            border-color: var(--ban);
        }
        
        .call-btn.end-call:hover {
            background: var(--ban);
            color: white;
        }
        
        .call-btn.muted {
            background: var(--ban-bg);
            color: var(--ban);
            border-color: var(--ban);
        }
        
        .incoming-call {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(20px);
            border: 2px solid var(--video-call);
            border-radius: 24px;
            padding: 30px;
            z-index: 6000;
            min-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(62, 166, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(62, 166, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(62, 166, 255, 0); }
        }
        
        .incoming-call h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .incoming-call-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn-accept, .btn-reject {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-accept {
            background: var(--video-call);
            color: white;
        }
        
        .btn-accept:hover {
            background: #2a8bff;
            transform: scale(1.05);
        }
        
        .btn-reject {
            background: var(--ban-bg);
            color: var(--ban);
            border: 1px solid var(--ban);
        }
        
        .btn-reject:hover {
            background: var(--ban);
            color: white;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            .video-container-local {
                position: absolute;
                bottom: 20px;
                right: 20px;
                width: 120px;
                height: 160px;
                z-index: 10;
            }
            
            .video-container-remote {
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- TÜM HTML KODLARI AYNEN KALIYOR, SADECE VİDEO CALL MODAL DEĞİŞİYOR -->
    <!-- ... mevcut HTML kodları ... -->
    
    <!-- YENİ GÖRÜNTÜLÜ ARAMA MODALI (WebRTC) -->
    <div class="video-call-modal" id="videoCallModal">
        <div class="video-call-container">
            <div class="video-call-header">
                <div id="videoCallWith">📹 Görüntülü Sohbet</div>
                <button onclick="endCall()">×</button>
            </div>
            
            <div class="video-grid">
                <!-- Uzaktaki kullanıcının videosu -->
                <div class="video-container-remote">
                    <div class="video-label" id="remoteVideoLabel">Karşı Taraf</div>
                    <video id="remoteVideo" class="video-element" autoplay playsinline></video>
                </div>
                
                <!-- Kendi videomuz -->
                <div class="video-container-local">
                    <div class="video-label">Siz</div>
                    <video id="localVideo" class="video-element" autoplay playsinline muted></video>
                </div>
            </div>
            
            <div class="call-controls">
                <button class="call-btn" onclick="toggleAudio()" id="muteBtn" title="Sesi Kapat/Aç">🔊</button>
                <button class="call-btn" onclick="toggleVideo()" id="videoBtn" title="Kamerayı Kapat/Aç">📹</button>
                <button class="call-btn end-call" onclick="endCall()" title="Görüntülü Sohbeti Sonlandır">📞</button>
            </div>
        </div>
    </div>
    
    <!-- GELEN ARAMA BİLDİRİMİ -->
    <div class="incoming-call" id="incomingCall" style="display: none;">
        <h3 id="incomingCaller">Görüntülü arama...</h3>
        <div class="incoming-call-buttons">
            <button class="btn-accept" onclick="acceptCall()">Kabul Et</button>
            <button class="btn-reject" onclick="rejectCall()">Reddet</button>
        </div>
    </div>
    
    <!-- ... diğer HTML kodları ... -->
    
    <script>
        // MEVCUT TÜM JS KODLARI AYNEN KALIYOR, SADECE VİDEO CALL KISMI DEĞİŞİYOR
        
        // ========== WEBRTC GÖRÜNTÜLÜ SOHBET SİSTEMİ - WHATSAPP TARZI GERÇEK ZAMANLI ==========
        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let activeCall = null;
        let incomingCallData = null;
        let callStatus = 'idle'; // idle, calling, ringing, connected
        let isAudioMuted = false;
        let isVideoOff = false;
        
        // WebRTC konfigürasyonu
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        };
        
        // Görüntülü arama başlat
        async function startVideoCall() {
            if (!privateChatWith) {
                alert('Önce bir kullanıcı ile özel sohbette olmalısınız!');
                return;
            }
            
            if (callStatus !== 'idle') {
                alert('Zaten aktif bir görüntülü sohbetiniz var!');
                return;
            }
            
            try {
                console.log('Görüntülü arama başlatılıyor...');
                
                // Kamera ve mikrofon erişimi
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 30 }
                    }, 
                    audio: true 
                });
                
                // Local video göster
                document.getElementById('localVideo').srcObject = localStream;
                
                // PeerConnection oluştur
                peerConnection = new RTCPeerConnection(configuration);
                
                // Local stream tracklerini ekle
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Remote stream'i hazırla
                remoteStream = new MediaStream();
                document.getElementById('remoteVideo').srcObject = remoteStream;
                
                // Remote track geldiğinde
                peerConnection.ontrack = (event) => {
                    event.streams[0].getTracks().forEach(track => {
                        remoteStream.addTrack(track);
                    });
                };
                
                // ICE candidate oluştuğunda Firebase'e gönder
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        sendIceCandidate(event.candidate);
                    }
                };
                
                // Bağlantı durumu değiştiğinde
                peerConnection.onconnectionstatechange = () => {
                    console.log('Bağlantı durumu:', peerConnection.connectionState);
                    
                    if (peerConnection.connectionState === 'disconnected' || 
                        peerConnection.connectionState === 'failed' ||
                        peerConnection.connectionState === 'closed') {
                        endCall();
                    }
                };
                
                // Offer oluştur
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Firebase'e arama kaydı oluştur
                const callRef = await videoCallsRef.push({
                    from: currentUser.name,
                    to: privateChatWith,
                    type: 'offer',
                    offer: offer,
                    status: 'ringing',
                    timestamp: Date.now()
                });
                
                activeCall = {
                    id: callRef.key,
                    from: currentUser.name,
                    to: privateChatWith
                };
                
                callStatus = 'calling';
                
                // UI'ı güncelle
                document.getElementById('videoCallWith').textContent = `📹 ${privateChatWith} ile görüntülü sohbet`;
                document.getElementById('videoCallModal').style.display = 'flex';
                document.getElementById('overlay').style.display = 'block';
                
                // Özel sohbet mesajı gönder
                const chatId = generateChatId(currentUser.name, privateChatWith);
                await privateChatsRef.child(chatId).push({
                    sender: currentUser.name,
                    receiver: privateChatWith,
                    text: '📹 Görüntülü arama başlattı...',
                    type: 'video-call-start',
                    timestamp: Date.now(),
                    time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
                });
                
                console.log('Görüntülü arama başlatıldı, ID:', callRef.key);
                
            } catch (error) {
                console.error('Arama başlatma hatası:', error);
                alert('Kamera veya mikrofon başlatılamadı!');
                cleanupCall();
            }
        }
        
        // ICE candidate gönder
        async function sendIceCandidate(candidate) {
            if (!activeCall) return;
            
            await videoCallsRef.child(activeCall.id).update({
                type: 'candidate',
                candidate: candidate,
                from: currentUser.name,
                timestamp: Date.now()
            });
        }
        
        // Arama kabul et
        async function acceptCall() {
            if (!incomingCallData) return;
            
            try {
                document.getElementById('incomingCall').style.display = 'none';
                
                // Kamera ve mikrofon erişimi
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 30 }
                    }, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                
                // PeerConnection oluştur
                peerConnection = new RTCPeerConnection(configuration);
                
                // Local stream tracklerini ekle
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Remote stream'i hazırla
                remoteStream = new MediaStream();
                document.getElementById('remoteVideo').srcObject = remoteStream;
                
                peerConnection.ontrack = (event) => {
                    event.streams[0].getTracks().forEach(track => {
                        remoteStream.addTrack(track);
                    });
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        sendIceCandidate(event.candidate);
                    }
                };
                
                // Offer'ı set et
                await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingCallData.offer));
                
                // Answer oluştur
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                // Firebase'e answer gönder
                await videoCallsRef.child(incomingCallData.id).update({
                    type: 'answer',
                    answer: answer,
                    status: 'connected',
                    timestamp: Date.now()
                });
                
                activeCall = {
                    id: incomingCallData.id,
                    from: incomingCallData.from,
                    to: currentUser.name
                };
                
                callStatus = 'connected';
                
                // UI'ı güncelle
                document.getElementById('videoCallWith').textContent = `📹 ${incomingCallData.from} ile görüntülü sohbet`;
                document.getElementById('videoCallModal').style.display = 'flex';
                document.getElementById('overlay').style.display = 'block';
                
                // Özel sohbet mesajı gönder
                const chatId = generateChatId(currentUser.name, incomingCallData.from);
                await privateChatsRef.child(chatId).push({
                    sender: currentUser.name,
                    receiver: incomingCallData.from,
                    text: '📹 Görüntülü aramayı kabul etti!',
                    type: 'video-call-accept',
                    timestamp: Date.now(),
                    time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
                });
                
                incomingCallData = null;
                console.log('Arama kabul edildi');
                
            } catch (error) {
                console.error('Arama kabul hatası:', error);
                alert('Arama kabul edilemedi!');
                cleanupCall();
            }
        }
        
        // Arama reddet
        async function rejectCall() {
            if (incomingCallData) {
                await videoCallsRef.child(incomingCallData.id).update({
                    status: 'rejected',
                    timestamp: Date.now()
                });
                
                document.getElementById('incomingCall').style.display = 'none';
                incomingCallData = null;
            }
        }
        
        // Arama sonlandır
        function endCall() {
            console.log('Arama sonlandırılıyor...');
            
            if (activeCall) {
                videoCallsRef.child(activeCall.id).update({
                    status: 'ended',
                    timestamp: Date.now()
                });
            }
            
            cleanupCall();
            
            document.getElementById('videoCallModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('incomingCall').style.display = 'none';
        }
        
        // Temizlik
        function cleanupCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            remoteStream = null;
            activeCall = null;
            incomingCallData = null;
            callStatus = 'idle';
            isAudioMuted = false;
            isVideoOff = false;
            
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('muteBtn').textContent = '🔊';
            document.getElementById('videoBtn').textContent = '📹';
        }
        
        // Sesi aç/kapa
        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isAudioMuted = !audioTrack.enabled;
                    document.getElementById('muteBtn').textContent = isAudioMuted ? '🔇' : '🔊';
                    document.getElementById('muteBtn').classList.toggle('muted', isAudioMuted);
                }
            }
        }
        
        // Videoyu aç/kapa
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    isVideoOff = !videoTrack.enabled;
                    document.getElementById('videoBtn').textContent = isVideoOff ? '🚫' : '📹';
                }
            }
        }
        
        // Firebase arama listener'ı
        function setupVideoCallListener() {
            if (!videoCallsRef || !currentUser) return;
            
            // Gelen aramaları dinle
            videoCallsRef.orderByChild('to').equalTo(currentUser.name).on('child_added', (snapshot) => {
                const callData = snapshot.val();
                if (!callData) return;
                
                console.log('Gelen arama:', callData);
                
                // Sadece ringing durumundaki aramaları göster
                if (callData.status === 'ringing' && callData.from !== currentUser.name && callStatus === 'idle') {
                    incomingCallData = {
                        id: snapshot.key,
                        ...callData
                    };
                    
                    showIncomingCall(callData.from);
                }
            });
            
            // Arama durumu değişikliklerini dinle
            videoCallsRef.on('child_changed', async (snapshot) => {
                const callData = snapshot.val();
                if (!callData) return;
                
                // Aktif aramamız varsa
                if (activeCall && activeCall.id === snapshot.key) {
                    
                    // Karşı taraf answer gönderdi
                    if (callData.type === 'answer' && callData.answer) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.answer));
                        callStatus = 'connected';
                        console.log('Bağlantı kuruldu');
                    }
                    
                    // ICE candidate geldi
                    if (callData.type === 'candidate' && callData.candidate && callData.from !== currentUser.name) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(callData.candidate));
                        } catch (e) {
                            console.error('ICE candidate ekleme hatası:', e);
                        }
                    }
                    
                    // Arama sonlandı
                    if (callData.status === 'ended' || callData.status === 'rejected') {
                        if (callData.status === 'rejected') {
                            alert('Arama reddedildi!');
                        }
                        endCall();
                    }
                }
            });
            
            // Silinen aramalar
            videoCallsRef.on('child_removed', (snapshot) => {
                if (activeCall && activeCall.id === snapshot.key) {
                    endCall();
                }
            });
        }
        
        // Gelen arama göster
        function showIncomingCall(caller) {
            document.getElementById('incomingCaller').innerHTML = `
                <div style="margin-bottom: 10px;">📹</div>
                <strong>${caller}</strong> sizi görüntülü aramaya davet ediyor!
            `;
            document.getElementById('incomingCall').style.display = 'block';
            
            // 30 saniye sonra otomatik reddet
            setTimeout(() => {
                if (incomingCallData) {
                    rejectCall();
                }
            }, 30000);
        }
        
        // Attach menüde görüntülü arama butonu
        function startVideoCallFromMenu() {
            startVideoCall();
        }
        
        // Mevcut attach dropdown'ı güncelle
        function updateAttachMenu() {
            // Bu fonksiyon mevcut attach dropdown'daki "Görüntülü Sohbet" butonunu günceller
            const attachDropdown = document.querySelector('.attach-dropdown');
            if (attachDropdown) {
                const videoCallOption = attachDropdown.querySelector('.attach-option:last-child');
                if (videoCallOption) {
                    videoCallOption.onclick = startVideoCallFromMenu;
                }
            }
        }
        
        // Initialize fonksiyonuna ekle
        const originalInitApp = initApp;
        initApp = function() {
            if (originalInitApp) originalInitApp();
            updateAttachMenu();
            if (currentUser) {
                setupVideoCallListener();
            }
        };
        
        // Login sonrası listener'ı başlat
        const originalCompleteLogin = completeLogin;
        completeLogin = async function(username, role, isRegistered, userData) {
            await originalCompleteLogin(username, role, isRegistered, userData);
            setupVideoCallListener();
        };
        
        // ========== MEVCUT TÜM KODLAR AYNEN DEVAM EDİYOR ==========
        // (Buraya kadar olan tüm mevcut JavaScript kodları aynen kalıyor)
        
    </script>
    
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
