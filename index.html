            box-sizing: border-box;

        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 1px solid rgba(255,68,68,0.3);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #ff4444, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        
        .date-badge {
            background: #ff4444;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(255,68,68,0.5);
            animation: pulse 2s infinite;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 30px;
        }
        
        .live-dot {
            width: 12px;
            height: 12px;
            background: #ff4444;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        /* Lig Filtreleri */
        .league-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .league-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .league-btn:hover {
            background: #ff4444;
            transform: translateY(-2px);
        }
        
        .league-btn.active {
            background: #ff4444;
            border-color: #ffd700;
        }
        
        .league-btn i {
            font-size: 18px;
        }
        
        /* Ana Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        /* Maç Kartları */
        .matches-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .matches-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .matches-header h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            color: #ffd700;
        }
        
        .refresh-btn {
            background: #2a2f3f;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .refresh-btn:hover {
            background: #ff4444;
            transform: rotate(180deg);
        }
        
        /* Maç Kartı */
        .match-card {
            background: linear-gradient(135deg, rgba(42,47,63,0.8), rgba(26,31,47,0.9));
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .match-card:hover {
            transform: translateX(5px);
            border-color: #ff4444;
            box-shadow: 0 10px 30px rgba(255,68,68,0.2);
        }
        
        .match-card.live {
            border-left: 4px solid #ff4444;
            animation: livePulse 2s infinite;
        }
        
        .match-league {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #aaa;
            font-size: 12px;
        }
        
        .match-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .team-name {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }
        
        .team-score {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
        }
        
        .match-time {
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
        
        .match-time .status {
            color: #ff4444;
            font-weight: 600;
        }

            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .prediction-badge {
            background: #ff4444;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

            width: 100px;
            height: 6px;
            background: #2a2f3f;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff4444);
            border-radius: 3px;
        }

            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 20px;
        }

            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel-header i {
            color: #ffd700;
            font-size: 24px;
        }

            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(42,47,63,0.5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 11px;
            color: #aaa;

            border-radius: 20px;
            margin-top: 25px;
            border: 1px solid rgba(255,255,255,0.05);

            align-items: center;
            gap: 10px;

            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);

            background: #2a2f3f;
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: #fff;

            color: #fff;

            height: 50px;
            border-radius: 8px;

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }

            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }

            0% { border-left-color: #ff4444; }

            width: 50px;
            height: 50px;

            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 50px auto;
        }
        
        @keyframes spin {

        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

        // ==================== TAHMİN MOTORU ====================
        function macAnaliz(mac) {
            let puan = 60;
            let tahmin = {};
            
            // İç saha/dış saha analizi
            const icAvantaj = mac.icSahaGuc - 50;
            const disAvantaj = mac.deplasmanGuc - 50;
            
            if (icAvantaj > 30) {
                puan += 18;
                tahmin.ana = "🏠 Ev Sahibi Kazanır";
                tahmin.kod = "MS1";
                tahmin.oran = mac.oranlar.ms1;
            } else if (disAvantaj > 25) {
                puan += 15;
                tahmin.ana = "✈️ Deplasman Kazanır";
                tahmin.kod = "MS2";
                tahmin.oran = mac.oranlar.ms2;
            } else {
                puan += 10;
                tahmin.ana = "⚖️ Beraberlik";
                tahmin.kod = "X";
                tahmin.oran = mac.oranlar.msX;
            }
            
            // Karşılıklı gol analizi
            const kgPuan = (mac.golOrt * 20) + ((mac.evPuan + mac.deplasmanPuan) * 0.3);
            if (kgPuan > 65) {
                tahmin.kg = "⚽⚽ KG VAR";
                tahmin.kgOran = mac.oranlar.kgVar;
            } else if (kgPuan < 40) {
                tahmin.kg = "🧤 KG YOK";
                tahmin.kgOran = mac.oranlar.kgYok;
            } else {
                tahmin.kg = kgPuan > 50 ? "⚽⚽ KG VAR" : "🧤 KG YOK";
                tahmin.kgOran = kgPuan > 50 ? mac.oranlar.kgVar : mac.oranlar.kgYok;
            }
            
            // Form analizi
            if (mac.evForm.includes('GGG')) puan += 8;
            if (mac.deplasmanForm.includes('GGG')) puan += 5;
            
            // Sakatlık etkisi
            if (mac.sakatlik.includes('yok') || mac.sakatlik.includes('tam')) puan += 5;
            if (mac.sakatlik.includes('eksik') || mac.sakatlik.includes('cezalı')) puan -= 8;
            
            tahmin.guven = Math.min(99, Math.max(60, Math.floor(puan)));
            
            return tahmin;
        }

        // ==================== UI GÜNCELLEME ====================
        function initLeagueFilters() {
            const container = document.getElementById('leagueFilters');
            let html = `
                <div class="league-btn active" onclick="filterLeague('all')">
                    <i class="fas fa-globe"></i> Tüm Ligler
                </div>
            `;
            
            for (let [key, lig] of Object.entries(LIGLER)) {
                html += `
                    <div class="league-btn" onclick="filterLeague('${key}')">
                        <span>${lig.icon}</span> ${lig.name}
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function filterLeague(lig) {
            seciliLig = lig;
            
            // Aktif class'ları güncelle
            document.querySelectorAll('.league-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Lig adını göster
            const ligAdi = lig === 'all' ? 'TÜM LİGLER' : LIGLER[lig].name;
            document.getElementById('selectedLeague').textContent = ligAdi;
            
            // Maçları filtrele ve göster
            renderMatches();
        }

        function renderMatches() {
            const filtered = seciliLig === 'all' 
                ? MACLAR 
                : MACLAR.filter(m => m.lig === seciliLig);
            
            document.getElementById('matchCount').textContent = filtered.length;
            
            let html = '';
            filtered.forEach(mac => {
                const analiz = macAnaliz(mac);
                const canliClass = mac.canli ? 'live' : '';
                const aktifClass = seciliMac?.id === mac.id ? 'active' : '';
                
                html += `
                    <div class="match-card ${canliClass}" onclick="selectMatch(${mac.id})">
                        <div class="match-league">
                            <span>${LIGLER[mac.lig].icon} ${LIGLER[mac.lig].name}</span>
                            <span style="margin-left: auto;">${mac.tarih} ${mac.saat}</span>
                        </div>
                        
                        <div class="match-teams">
                            <div class="team">
                                <span class="team-name">${mac.ev}</span>
                                <span class="team-score">${mac.skor.split('-')[0]}</span>
                            </div>
                            
                            <div class="match-time">
                                <div class="status">${mac.canli ? `CANLI ${mac.dakika}'` : 'Hazırlanıyor'}</div>
                                <div>VS</div>
                            </div>
                            
                            <div class="team">
                                <span class="team-name">${mac.deplasman}</span>
                                <span class="team-score">${mac.skor.split('-')[1]}</span>
                            </div>
                        </div>
                        
                        <div class="match-prediction">
                            <div>
                                <span class="prediction-badge">${analiz.ana}</span>
                                <span style="margin-left: 10px; color: #ffd700;">${analiz.kg}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="color: #aaa; font-size: 12px;">Güven:</span>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${analiz.guven}%"></div>
                                </div>
                                <span style="color: #ffd700; font-weight: bold;">${analiz.guven}%</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('matchesList').innerHTML = html;
        }

        function selectMatch(macId) {
            seciliMac = MACLAR.find(m => m.id === macId);
            if (!seciliMac) return;
            
            const analiz = macAnaliz(seciliMac);
            
            const html = `
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                        <span style="font-size: 24px;">${LIGLER[seciliMac.lig].icon}</span>
                        <div>
                            <div style="font-size: 12px; color: #aaa;">${LIGLER[seciliMac.lig].name}</div>
                            <div style="font-size: 18px; font-weight: bold;">${seciliMac.ev} vs ${seciliMac.deplasman}</div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${analiz.guven}%</div>
                            <div class="stat-label">Güven Oranı</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${seciliMac.golOrt}</div>
                            <div class="stat-label">Gol Ortalaması</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${seciliMac.evPuan}</div>
                            <div class="stat-label">${seciliMac.ev} Puan</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${seciliMac.deplasmanPuan}</div>
                            <div class="stat-label">${seciliMac.deplasman} Puan</div>
                        </div>
                    </div>
                    
                    <div style="background: #ff4444; border-radius: 12px; padding: 20px; margin: 20px 0;">
                        <h4 style="color: #ffd700; margin-bottom: 15px;">🎯 KESİN TAHMIN</h4>
                        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">${analiz.ana}</div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span>${analiz.kg}</span>
                            <span style="background: #000; padding: 5px 15px; border-radius: 20px;">Oran: ${analiz.oran}</span>
                        </div>
                        <div style="font-size: 14px; color: #ddd;">📊 ${seciliMac.sakatlik}</div>
                    </div>
                    
                    <div style="background: #2a2f3f; border-radius: 12px; padding: 20px;">
                        <h4 style="color: #ffd700; margin-bottom: 15px;">📈 DETAYLI ANALİZ</h4>
                        <p style="margin-bottom: 10px;">• ${seciliMac.ev} son 5 maç: ${seciliMac.evForm}</p>
                        <p style="margin-bottom: 10px;">• ${seciliMac.deplasman} son 5 maç: ${seciliMac.deplasmanForm}</p>
                        <p>• Maç başına gol: ${seciliMac.golOrt}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('panelContent').innerHTML = html;
            
            // Sohbete mesaj ekle
            addChatMessage('🤖 Bot', `🎯 ${seciliMac.ev} - ${seciliMac.deplasman} için tahmin: ${analiz.ana} (Güven: %${analiz.guven})`);
        }

        // ==================== SOHBET SİSTEMİ ====================
        function addChatMessage(sender, message) {
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            const chatDiv = document.getElementById('chatMessages');
            
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = '10px';
            msgDiv.style.padding = '8px';
            msgDiv.style.background = sender === '🤖 Bot' ? 'rgba(255,68,68,0.1)' : 'rgba(255,255,255,0.05)';
            msgDiv.style.borderRadius = '8px';
            
            msgDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span style="color: #ffd700;">${sender}</span>
                    <span style="color: #666; font-size: 11px;">${time}</span>
                </div>
                <div style="color: #fff;">${message}</div>
            `;
            
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            if (msg.toLowerCase() === '!tahmin') {
                if (seciliMac) {
                    const analiz = macAnaliz(seciliMac);
                    addChatMessage('🤖 Bot', `🔴 ${seciliMac.ev} - ${seciliMac.deplasman} 🆚`);
                    addChatMessage('🤖 Bot', `🎯 ${analiz.ana} (Güven: %${analiz.guven})`);
                    addChatMessage('🤖 Bot', `⚽ ${analiz.kg} | 💲 Oran: ${analiz.oran}`);
                } else {
                    const rastgeleMac = MACLAR[Math.floor(Math.random() * MACLAR.length)];
                    const analiz = macAnaliz(rastgeleMac);
                    addChatMessage('🤖 Bot', `⚡ RASTGELE TAHMİN:`);
                    addChatMessage('🤖 Bot', `⚽ ${rastgeleMac.ev} - ${rastgeleMac.deplasman}`);
                    addChatMessage('🤖 Bot', `🎯 ${analiz.ana} (Güven: %${analiz.guven})`);
                }
            } else if (msg.toLowerCase() === '!yardım') {
                addChatMessage('🤖 Bot', `📚 KOMUTLAR:`);
                addChatMessage('🤖 Bot', `!tahmin - Seçili maçın tahmini`);
                addChatMessage('🤖 Bot', `!canlı - Canlı maçları göster`);
                addChatMessage('🤖 Bot', `!ligler - Ligleri listele`);
            } else if (msg.toLowerCase() === '!canlı') {
                const canliMaclar = MACLAR.filter(m => m.canli);
                addChatMessage('🤖 Bot', `🔴 CANLI MAÇLAR (${canliMaclar.length}):`);
                canliMaclar.forEach(m => {
                    addChatMessage('🤖 Bot', `${m.ev} ${m.skor} ${m.deplasman} (${m.dakika}')`);
                });
            } else {
                addChatMessage('👤 Sen', msg);
            }
            
            input.value = '';
        }

        // ==================== BAŞLANGIÇ ====================
        function init() {
            // Tarihi göster
            const today = new Date();
            document.getElementById('currentDate').textContent = 
                today.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            
            // Lig filtrelerini oluştur
            initLeagueFilters();
            
            // Maçları render et
            renderMatches();
            
            // Hoş geldin mesajı
            addChatMessage('🤖 Bot', '🔴 2026 CANLI TAHMİN SİSTEMİNE HOŞ GELDİN!');
            addChatMessage('🤖 Bot', '📊 Bugün ' + MACLAR.length + ' maç analiz ediliyor');
            addChatMessage('🤖 Bot', '💡 !yardım yazarak komutları görebilirsin');
            
            // Otomatik güncelleme (her 30 saniyede bir)
            setInterval(() => {
                // Canlı skorları güncelle (simülasyon)
                MACLAR.forEach(mac => {
                    if (mac.canli) {
                        mac.dakika += 1;
                        if (mac.dakika > 90) mac.dakika = 90;
                        
                        // Rastgele gol (simülasyon)
                        if (Math.random() < 0.05) {
                            const golTakim = Math.random() > 0.5 ? 'ev' : 'deplasman';
                            const skor = mac.skor.split('-');
                            if (golTakim === 'ev') {
                                skor[0] = parseInt(skor[0]) + 1;
                            } else {
                                skor[1] = parseInt(skor[1]) + 1;
                            }
                            mac.skor = skor.join('-');
                            addChatMessage('🤖 Bot', `⚽ GOL! ${mac.ev} ${mac.skor} ${mac.deplasman}`);
                        }
                    }
                });
                
                renderMatches();
                if (seciliMac) {
                    selectMatch(seciliMac.id);
                }
            }, 30000);
        }

        // Sayfa yüklendiğinde başlat
        window.onload = init;

        // Manuel refresh için
        function fetchAllMatches() {
            renderMatches();
            addChatMessage('🤖 Bot', '🔄 Maçlar güncellendi!');
        }
    </script>
</body>
</html>
