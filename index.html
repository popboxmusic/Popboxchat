<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CETCETY • Çift Medya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Firebase v9 Compat (çalışan versiyon) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Giriş Ekranı */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-panel {
            width: 100%;
            max-width: 380px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 28px;
            color: #fff;
        }

        .login-panel h2 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .login-panel label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
        }

        .login-panel input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .login-panel input:focus {
            border-color: #ff0000;
        }

        .login-panel button {
            width: 100%;
            padding: 16px;
            background: #ff0000;
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .login-panel button:active {
            background: #cc0000;
        }

        /* Ana Uygulama */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Sol İkon Paneli */
        .icon-panel {
            width: 80px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 16px;
            flex-shrink: 0;
            height: 100vh;
            z-index: 20;
        }

        .icon-item {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            cursor: pointer;
            font-size: 22px;
            position: relative;
        }

        .icon-item.active {
            color: #fff;
            background: #ff0000;
        }

        .icon-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4444;
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0a0a0a;
        }

        .profile-avatar {
            margin-top: auto;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #ff0000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            overflow: hidden;
        }

        /* Ana İçerik */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sol Panel */
        .left-panel {
            width: 320px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 15;
        }

        .panel-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 15, 15, 0.9);
        }

        .panel-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
        }

        .subscription-count {
            background: #ff0000;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
        }

        .panel-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            cursor: pointer;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Sohbet Konteynırı */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: rgba(15, 15, 15, 0.7);
            position: relative;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 15, 15, 0.9);
            flex-shrink: 0;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 16px;
        }

        .chat-title i {
            color: #ff0000;
        }

        .channel-info-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #aaa;
            font-size: 13px;
        }

        .channel-subscribe-btn {
            padding: 8px 20px;
            background: rgba(39, 39, 39, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-subscribe-btn.subscribed {
            background: #ff0000;
        }

        /* Mesajlar */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            position: relative;
        }

        .message.right {
            align-self: flex-end;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-sender {
            font-weight: 700;
            font-size: 14px;
            color: #ff8888;
            cursor: pointer;
        }

        .message-time {
            font-size: 11px;
            color: #777;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
            color: #fff;
            word-break: break-word;
        }

        .message.right .message-text {
            color: #ff0000;
        }

        .delete-message-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            z-index: 5;
        }

        .message:hover .delete-message-btn {
            opacity: 1;
        }

        .system-message {
            align-self: center;
            color: #aaa;
            font-size: 12px;
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 40px;
            margin: 8px 0;
            max-width: 90%;
            text-align: center;
        }

        /* Mesaj Giriş */
        .message-input-container {
            padding: 20px 24px;
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 4px 4px 4px 20px;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            padding: 14px 0;
            resize: none;
            max-height: 100px;
            outline: none;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        /* Özel Sohbet Paneli */
        .private-chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            display: none;
            flex-direction: column;
            z-index: 30;
        }

        .private-chat-panel.active {
            display: flex;
        }

        .private-chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 15, 15, 0.9);
            flex-shrink: 0;
        }

        .private-chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .private-chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            overflow: hidden;
        }

        .private-chat-info h4 {
            font-size: 16px;
            font-weight: 700;
        }

        .private-chat-info span {
            font-size: 12px;
            color: #aaa;
        }

        .private-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .private-message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            position: relative;
        }

        .private-message.right {
            align-self: flex-end;
        }

        .private-message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .private-message-sender {
            font-weight: 600;
            font-size: 13px;
            color: #ff8888;
        }

        .private-message-time {
            font-size: 10px;
            color: #777;
        }

        .private-message-text {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
        }

        .private-message.right .private-message-text {
            color: #ff0000;
        }

        .private-input-container {
            padding: 20px;
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .private-text-input {
            display: flex;
            gap: 12px;
        }

        .private-input {
            flex: 1;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 14px 20px;
            color: #fff;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .private-send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
        }

        /* YouTube Paneli */
        .media-panel {
            width: 380px;
            background: rgba(10, 10, 10, 0.95);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .media-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 15, 15, 0.9);
        }

        .media-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            background: rgba(26, 26, 26, 0.8);
            color: #aaa;
        }

        .media-tab.active {
            background: #ff0000;
            color: #fff;
        }

        .media-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        #youtubeContainer {
            width: 100%;
            height: 100%;
        }

        .media-now-playing {
            padding: 14px 20px;
            background: rgba(15, 15, 15, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .now-playing-title {
            font-weight: 700;
        }

        .now-playing-artist {
            font-size: 12px;
            color: #aaa;
        }

        .role-icon.owner { color: #ffd700; }
        .role-icon.admin { color: #ff6b6b; }
        .role-icon.coadmin { color: #6495ed; }
        .role-icon.operator { color: #98fb98; }

        .media-playlist-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .media-playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .media-playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .media-playlist-item.active {
            background: rgba(26, 26, 26, 0.8);
            border-left: 4px solid #ff0000;
        }

        .media-playlist-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(26, 26, 26, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #ff0000;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 6px;
            border: 1px solid;
        }

        .badge-owner { color: #ffd700; border-color: #ffd700; }
        .badge-admin { color: #ff6b6b; border-color: #ff6b6b; }
        .badge-coadmin { color: #6495ed; border-color: #6495ed; }
        .badge-operator { color: #98fb98; border-color: #98fb98; }

        /* Bağlantı Durumu */
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(42, 42, 42, 0.9);
            color: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connection-status.connected { background: rgba(10, 92, 54, 0.9); }
        .connection-status.connecting { background: rgba(255, 170, 0, 0.9); }
        .connection-status.disconnected { background: rgba(138, 0, 0, 0.9); }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .connected .status-dot { background: #2ecc71; }
        .connecting .status-dot { background: #ffaa00; }
        .disconnected .status-dot { background: #ff4444; }

        @media (max-width: 768px) {
            .icon-panel { display: none; }
            .media-panel { display: none; }
            .left-panel { position: fixed; width: 85%; transform: translateX(-100%); }
            .left-panel.active { transform: translateX(0); }
            .private-chat-panel { position: fixed; width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>
    <!-- Giriş Ekranı -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-panel">
            <h2>CETCETY</h2>
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="loginNick" placeholder="örn: kullanici" value="test">
            </div>
            <div class="form-group">
                <label>Şifre (opsiyonel)</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button type="button" onclick="handleLogin()">Giriş Yap / Kayıt Ol</button>
        </div>
    </div>

    <!-- Ana Uygulama -->
    <div id="app" class="app" style="display: none;">
        <!-- Sol İkon Paneli -->
        <div class="icon-panel">
            <div class="icon-item" onclick="openSubscriptions()" title="Abonelikler">
                <i class="fas fa-bell"></i>
                <span class="icon-badge" id="subscriptionBadge">0</span>
            </div>
            <div class="icon-item" onclick="openChannelPanel()" title="Kanallar">
                <i class="fas fa-list-ul"></i>
                <span class="icon-badge" id="channelCountBadge">0</span>
            </div>
            <div class="icon-item" onclick="openChatListPanel()" title="Sohbetler">
                <i class="fas fa-comment"></i>
                <span class="icon-badge" id="chatListBadge">0</span>
            </div>
            <div class="profile-avatar" id="profileAvatar" onclick="openProfilePanel()">
                <span id="avatarText">?</span>
            </div>
        </div>

        <div class="main-content">
            <!-- Sol Panel -->
            <div class="left-panel" id="leftPanel"></div>

            <!-- Sohbet Konteynırı -->
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-title">
                        <i class="fas fa-hashtag"></i>
                        <span id="currentChannelName">genel</span>
                        <span class="channel-info-bar">
                            <span id="channelUserCount">1</span> çevrimiçi
                        </span>
                    </div>
                    <button id="subscribeChannelBtn" class="channel-subscribe-btn" onclick="toggleChannelSubscribe()">
                        <i class="fas fa-plus"></i> Abone Ol
                    </button>
                </div>

                <div class="messages" id="messages">
                    <div class="system-message"><i class="fas fa-info-circle"></i> CETCETY'ye hoş geldin! /help yazarak komutları görebilirsin.</div>
                </div>

                <div class="message-input-container">
                    <div class="input-wrapper">
                        <textarea id="messageInput" class="message-input" placeholder="Mesaj yazın... /help" rows="1" oninput="autoResize(this)"></textarea>
                        <div class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></div>
                    </div>
                </div>

                <!-- Özel Sohbet Paneli -->
                <div id="privateChatPanel" class="private-chat-panel">
                    <div class="private-chat-header">
                        <div class="private-chat-user">
                            <div class="private-chat-avatar" id="privateChatAvatar">?</div>
                            <div class="private-chat-info">
                                <h4 id="privateChatName">Kullanıcı</h4>
                                <span id="privateChatStatus">çevrimdışı</span>
                            </div>
                        </div>
                        <div class="private-chat-actions">
                            <div class="private-chat-action" onclick="closePrivateChat()"><i class="fas fa-times"></i></div>
                        </div>
                    </div>
                    <div class="private-chat-messages" id="privateChatMessages"></div>
                    <div class="private-input-container">
                        <div class="private-text-input">
                            <textarea id="privateMessageInput" class="private-input" placeholder="Mesaj yazın..." rows="1" oninput="autoResize(this)"></textarea>
                            <div class="private-send-btn" onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- YouTube Paneli -->
            <div class="media-panel">
                <div class="media-header">
                    <div class="media-tab active">
                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>
                    </div>
                </div>
                <div class="media-player">
                    <div id="youtubeContainer"></div>
                </div>
                <div class="media-now-playing">
                    <i class="fas fa-circle" style="color: #ff0000; font-size: 8px;"></i>
                    <div class="now-playing-info">
                        <div class="now-playing-title" id="youtubeNowPlayingTitle">Crispy Concords</div>
                        <div class="now-playing-artist" id="youtubeNowPlayingArtist">
                            <span class="role-icon owner">👑</span>
                            <span id="youtubeNowPlayingOwner">MateKy</span>
                        </div>
                    </div>
                </div>
                <div class="media-playlist-container">
                    <div class="media-playlist-header">
                        <span class="media-playlist-title"><i class="fas fa-list"></i> Playlist</span>
                        <span class="media-playlist-count" id="youtubePlaylistCount">1 video</span>
                    </div>
                    <div id="youtubePlaylistItems" class="media-playlist-items"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bağlantı Durumu -->
    <div id="connectionStatus" class="connection-status connecting">
        <span class="status-dot"></span>
        <span id="statusText">Bağlanıyor...</span>
    </div>

    <script>
        // ============= FIREBASE CONFIG =============
        const firebaseConfig = {
            apiKey: "AIzaSyCrn_tXJZCAlKhem45aXxj4f0h26EPOQ70",

        // ============= YARDIMCI FONKSİYONLAR =============
        function escapeHTML(t) { return t ? String(t).replace(/[&<>"]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }) : ''; }
        
        function autoResize(t) { t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 100) + 'px'; }

        // ============= YETKİ KONTROL SİSTEMİ =============
        const PermissionManager = {
            getUserLevel(user) {
                if (!user) return 0;
                switch(user.role) {
                    case 'owner': return 5;
                    case 'admin': return 4;
                    case 'coadmin': return 3;
                    case 'operator': return 2;
                    default: return 1;
                }
            },

            hasPermission(user, channel, requiredLevel, options = {}) {
                if (!user) return false;
                const userLevel = this.getUserLevel(user);
                
                // OWNER her şeyi yapar
                if (userLevel >= 5) return true;
                
                // ADMIN kontrolü
                if (userLevel >= 4) {
                    if (requiredLevel >= 5) return false;
                    return true;
                }
                
                // CO-ADMIN kontrolü (kanal bazlı)
                if (userLevel >= 3) {
                    const channelData = channels[channel];
                    if (!channelData) return false;
                    
                    const isOwnChannel = channelData.coAdmins?.includes(user.name) || channelData.owner === user.name;
                    
                    if (requiredLevel <= 3 && isOwnChannel) return true;
                    if (options.specificPermission === 'kick' && isOwnChannel) return true;
                    if (options.specificPermission === 'mute' && isOwnChannel) return true;
                    
                    return false;
                }
                
                // OPERATOR kontrolü
                if (userLevel >= 2) {
                    if (options.specificPermission === 'mute') return true;
                    if (options.specificPermission === 'kick') return true;
                    return false;
                }
                
                return false;
            },

            canDeleteMessage(user, message) {
                if (!user || !message) return false;
                const userLevel = this.getUserLevel(user);
                
                if (message.senderId === user.id) return true;
                if (userLevel >= 5) return true;
                if (userLevel >= 4) return true;
                
                if (userLevel >= 3) {
                    const channelData = channels[message.channel];
                    if (channelData?.coAdmins?.includes(user.name)) return true;
                }
                
                return false;
            },

            getRoleIcon(role) {
                switch(role) {
                    case 'owner': return '👑';
                    case 'admin': return '⚡';
                    case 'coadmin': return '🔧';
                    case 'operator': return '🛠️';
                    default: return '👤';
                }
            }
        };

        // ============= REALTIME DİNLEYİCİLER =============
        function setupRealtimeListeners() {
            if (!database || !ACTIVE_USER) return;

            // Mesajları dinle
            database.ref('messages')
                .orderByChild('channel')
                .equalTo(currentChannel)
                .limitToLast(50)
                .on('child_added', (snapshot) => {
                    const msg = snapshot.val();
                    if (!msg) return;
                    
                    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                    
                    appendMessageToChat({
                        id: snapshot.key,
                        sender: msg.sender,
                        text: msg.text,
                        time: time,
                        timestamp: msg.timestamp,
                        senderId: msg.senderId
                    }, msg.sender === ACTIVE_USER?.name);
                });

            // Online kullanıcıları dinle
            database.ref('onlineUsers').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const now = Date.now();
                const twoMinutes = 120000;
                
                onlineUsersData = {};
                
                Object.entries(users).forEach(([name, data]) => {
                    if (data.lastSeen && (now - data.lastSeen) < twoMinutes) {
                        onlineUsersData[name] = data;
                    }
                });
                
                if (channels[currentChannel]) {
                    channels[currentChannel].onlineUsers = Object.values(onlineUsersData)
                        .filter(u => u.currentChannel === currentChannel)
                        .map(u => u.username);
                    
                    document.getElementById('channelUserCount').textContent = 
                        channels[currentChannel].onlineUsers.length;
                }
                
                if (currentPrivateChat) {
                    const isOnline = onlineUsersData[currentPrivateChat.name];
                    document.getElementById('privateChatStatus').textContent = 
                        isOnline ? '🟢 çevrimiçi' : '⚫ çevrimdışı';
                }
            });

            // Ban/Mute dinle
            database.ref('bannedUsers').on('value', (snapshot) => {
                BANNED_USERS = snapshot.val() || {};
            });

            database.ref('mutedUsers').on('value', (snapshot) => {
                MUTED_USERS = snapshot.val() || {};
            });
        }

        // ============= MESAJ GÖNDER =============
        async function sendMessage() {
            let inp = document.getElementById('messageInput');
            let txt = inp.value.trim();
            if (!txt) return;
            
            // Susturulmuş mu?
            if (MUTED_USERS?.[currentChannel]?.[ACTIVE_USER.name]) {
                const expiry = MUTED_USERS[currentChannel][ACTIVE_USER.name].expiry;
                if (expiry > Date.now()) {
                    addSystemMessage(`🔇 Susturuldun! Bitiş: ${new Date(expiry).toLocaleTimeString()}`);
                    inp.value = '';
                    return;
                }
            }
            
            // Komut mu?
            if (txt.startsWith('/')) {
                handleCommand(txt);
                inp.value = '';
                autoResize(inp);
                return;
            }
            
            // Firebase'e gönder
            try {
                await database.ref('messages').push({
                    sender: ACTIVE_USER.name,
                    senderId: ACTIVE_USER.id,
                    text: txt,
                    channel: currentChannel,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                inp.value = '';
                autoResize(inp);
            } catch (error) {
                console.error('Mesaj hatası:', error);
                addSystemMessage('❌ Mesaj gönderilemedi!');
            }
        }

        // ============= MESAJ EKLE =============
        function appendMessageToChat(msg, isMe) {
            let container = document.getElementById('messages');
            if (!container) return;

            let msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'right' : ''}`;
            msgDiv.dataset.messageId = msg.id || '';
            
            let deleteBtn = '';
            if (PermissionManager.canDeleteMessage(ACTIVE_USER, msg)) {
                deleteBtn = `<div class="delete-message-btn" onclick="deleteMessage('${msg.id}')"><i class="fas fa-trash"></i></div>`;
            }
            
            msgDiv.innerHTML = `${deleteBtn}<div class="message-header">
                <span class="message-time">${msg.time}</span>
                <span class="message-sender" onclick="openPrivateChat('${escapeHTML(msg.sender)}')">${escapeHTML(msg.sender)}</span>
            </div>
            <div class="message-text">${escapeHTML(msg.text)}</div>`;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

            if (!messageId) return;
            
            if (confirm('Bu mesajı silmek istediğinize emin misiniz?')) {
                try {
                    await database.ref('messages/' + messageId).remove();
                    document.querySelector(`[data-message-id="${messageId}"]`)?.remove();
                } catch (error) {
                    console.error('Silme hatası:', error);
                    addSystemMessage('❌ Mesaj silinemedi!');
                }

        }

        // ============= ÖZEL SOHBET =============
        function openPrivateChat(username) {
            if (!username || !ACTIVE_USER || username === ACTIVE_USER.name) return;
            
            currentPrivateChat = { name: username };
            currentPrivateChatId = [ACTIVE_USER.name, username].sort().join('_');
            
            document.getElementById('privateChatName').textContent = username;
            document.getElementById('privateChatAvatar').textContent = username.charAt(0).toUpperCase();
            
            const isOnline = onlineUsersData[username];
            document.getElementById('privateChatStatus').textContent = isOnline ? '🟢 çevrimiçi' : '⚫ çevrimdışı';
            
            document.getElementById('privateChatPanel').classList.add('active');
            
            // Özel mesajları dinle
            database.ref('privateChats/' + currentPrivateChatId)
                .orderByChild('timestamp')
                .limitToLast(50)
                .on('child_added', (snapshot) => {
                    const msg = snapshot.val();
                    if (!msg) return;
                    
                    if (!PRIVATE_CHATS[currentPrivateChatId]) PRIVATE_CHATS[currentPrivateChatId] = [];
                    PRIVATE_CHATS[currentPrivateChatId].push(msg);
                    
                    loadPrivateMessages();
                });
            
            loadPrivateMessages();
        }

        function closePrivateChat() {
            document.getElementById('privateChatPanel').classList.remove('active');
            if (currentPrivateChatId) {
                database.ref('privateChats/' + currentPrivateChatId).off();
            }
            currentPrivateChat = null;
            currentPrivateChatId = null;
        }

        function loadPrivateMessages() {
            if (!currentPrivateChatId) return;
            
            let msgs = PRIVATE_CHATS[currentPrivateChatId] || [];
            let container = document.getElementById('privateChatMessages');
            let html = '';
            
            msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            msgs.forEach((msg, index) => {
                let isMe = msg.senderId === ACTIVE_USER.id || msg.senderName === ACTIVE_USER.name;
                let time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                html += `<div class="private-message ${isMe ? 'right' : ''}">
                    <div class="private-message-header">
                        <span class="private-message-time">${time}</span>
                        <span class="private-message-sender">${escapeHTML(msg.senderName || msg.sender)}</span>
                    </div>
                    <div class="private-message-text">${escapeHTML(msg.content || msg.text)}</div>
                </div>`;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function sendPrivateMessage() {
            let input = document.getElementById('privateMessageInput');
            let text = input.value.trim();
            if (!text || !currentPrivateChat || !ACTIVE_USER) return;
            
            let messageData = {
                senderId: ACTIVE_USER.id,
                senderName: ACTIVE_USER.name,
                recipientName: currentPrivateChat.name,
                content: text,
                timestamp: Date.now()
            };
            
            try {
                await database.ref('privateChats/' + currentPrivateChatId).push(messageData);
                
                if (!PRIVATE_CHATS[currentPrivateChatId]) PRIVATE_CHATS[currentPrivateChatId] = [];
                PRIVATE_CHATS[currentPrivateChatId].push(messageData);
                
                loadPrivateMessages();
                input.value = '';
            } catch (error) {
                console.error('Özel mesaj hatası:', error);
                addSystemMessage('❌ Mesaj gönderilemedi!');
            }
        }

        // ============= KOMUT SİSTEMİ =============
        async function handleCommand(cmd) {
            const parts = cmd.substring(1).split(' ');
            const main = parts[0].toLowerCase();
            const args = parts.slice(1);
            
            // HELP
            if (main === 'help') {
                let helpText = "📋 **KOMUTLAR**\n\n";
                
                const userLevel = PermissionManager.getUserLevel(ACTIVE_USER);
                
                if (userLevel >= 5) {
                    helpText += "👑 **OWNER**\n/addadmin kullanıcı - Admin ata\n/addcoadmin kullanıcı #kanal - Co-Admin ata\n/addoperator kullanıcı #kanal - Operator ata\n/globalmsg mesaj - Global duyuru\n\n";
                }
                if (userLevel >= 4) {
                    helpText += "⚡ **ADMIN**\n/ban kullanıcı [süre] - Yasakla\n/unban kullanıcı - Yasağı kaldır\n/temizle - Sohbeti temizle\n\n";
                }
                if (userLevel >= 3) {
                    helpText += "🔧 **CO-ADMIN**\n/kick kullanıcı - At\n/mute kullanıcı [süre] - Sustur\n/unmute kullanıcı - Susturmayı kaldır\n/topic [konu] - Konu değiştir\n\n";
                }
                if (userLevel >= 2) {
                    helpText += "🛠️ **OPERATOR**\n/kick kullanıcı - At\n/mute kullanıcı [süre] - Sustur\n\n";
                }
                
                helpText += "👤 **HERKES**\n/join #kanal - Kanala katıl\n/msg kullanıcı mesaj - Özel mesaj\n/users - Çevrimiçiler\n/kanal - Kanal bilgisi\n/whois kullanıcı - Kullanıcı bilgisi\n/names - Kullanıcıları listele";
                
                addSystemMessage(helpText);
                return;
            }
            
            // JOIN
            if (main === 'join') {
                let channel = args[0]?.replace('#', '');
                if (!channel) {
                    addSystemMessage('Kullanım: /join #kanal');
                    return;
                }
                if (channels[channel]) {
                    currentChannel = channel;
                    document.getElementById('currentChannelName').textContent = channel;
                    document.getElementById('messages').innerHTML = '<div class="system-message"><i class="fas fa-info-circle"></i> Kanala katıldın.</div>';
                    
                    // Mesaj dinleyicisini yeniden başlat
                    database.ref('messages').orderByChild('channel').equalTo(channel).off();
                    setupRealtimeListeners();
                    
                    await updateOnlineStatus();
                    addSystemMessage(`📢 #${channel} kanalına katıldın.`);
                } else {
                    addSystemMessage(`❌ #${channel} kanalı bulunamadı.`);
                }
                return;
            }
            
            // KICK
            if (main === 'kick') {
                const target = args[0];
                if (!target) {
                    addSystemMessage('Kullanım: /kick kullanıcı');
                    return;
                }
                
                if (!PermissionManager.hasPermission(ACTIVE_USER, currentChannel, 2, { specificPermission: 'kick' })) {
                    addSystemMessage('❌ Yetkin yok!');
                    return;
                }
                
                if (!channels[currentChannel]?.onlineUsers?.includes(target)) {
                    addSystemMessage(`❌ ${target} kanalda değil.`);
                    return;
                }
                
                channels[currentChannel].onlineUsers = channels[currentChannel].onlineUsers.filter(u => u !== target);
                await database.ref('onlineUsers/' + target).update({ currentChannel: 'genel' });
                
                addSystemMessage(`👢 ${target} kanaldan atıldı.`);
                return;
            }
            
            // MUTE
            if (main === 'mute') {
                const target = args[0];
                const duration = parseInt(args[1]) || 10;
                
                if (!target) {
                    addSystemMessage('Kullanım: /mute kullanıcı [süre(dk)]');
                    return;
                }
                
                if (!PermissionManager.hasPermission(ACTIVE_USER, currentChannel, 2, { specificPermission: 'mute' })) {
                    addSystemMessage('❌ Yetkin yok!');
                    return;
                }
                
                const expiry = Date.now() + (duration * 60 * 1000);
                
                if (!MUTED_USERS[currentChannel]) MUTED_USERS[currentChannel] = {};
                MUTED_USERS[currentChannel][target] = { expiry, mutedBy: ACTIVE_USER.name };
                
                await database.ref('mutedUsers/' + currentChannel + '/' + target).set(MUTED_USERS[currentChannel][target]);
                
                addSystemMessage(`🔇 ${target} ${duration} dk susturuldu.`);
                return;
            }
            
            // BAN
            if (main === 'ban') {
                const target = args[0];
                const duration = parseInt(args[1]) || 1440;
                
                if (!target) {
                    addSystemMessage('Kullanım: /ban kullanıcı [süre(dk)]');
                    return;
                }
                
                if (!PermissionManager.hasPermission(ACTIVE_USER, currentChannel, 4)) {
                    addSystemMessage('❌ Sadece admin ve owner ban atabilir!');
                    return;
                }
                
                const expiry = Date.now() + (duration * 60 * 1000);
                
                if (!BANNED_USERS[currentChannel]) BANNED_USERS[currentChannel] = {};
                BANNED_USERS[currentChannel][target] = { expiry, bannedBy: ACTIVE_USER.name };
                
                await database.ref('bannedUsers/' + currentChannel + '/' + target).set(BANNED_USERS[currentChannel][target]);
                
                if (channels[currentChannel]?.onlineUsers?.includes(target)) {
                    channels[currentChannel].onlineUsers = channels[currentChannel].onlineUsers.filter(u => u !== target);
                    await database.ref('onlineUsers/' + target).update({ currentChannel: 'genel' });
                }
                
                addSystemMessage(`🚫 ${target} ${duration} dk yasaklandı!`);
                return;
            }
            
            // TEMIZLE
            if (main === 'temizle') {
                if (!PermissionManager.hasPermission(ACTIVE_USER, currentChannel, 4)) {
                    addSystemMessage('❌ Sohbet temizleme yetkin yok!');
                    return;
                }
                
                const snapshot = await database.ref('messages')
                    .orderByChild('channel')
                    .equalTo(currentChannel)
                    .once('value');
                
                const messages = snapshot.val();
                if (messages) {
                    const deletePromises = Object.keys(messages).map(key => 
                        database.ref('messages/' + key).remove()
                    );
                    await Promise.all(deletePromises);
                }
                
                await database.ref('messages').push({
                    sender: 'SİSTEM',
                    senderId: 'system',
                    text: `🗑️ Sohbet ${ACTIVE_USER.name} tarafından temizlendi.`,
                    channel: currentChannel,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                
                addSystemMessage('✅ Sohbet temizlendi!');
                return;
            }
            
            // ADDADMIN (sadece owner)
            if (main === 'addadmin' && PermissionManager.getUserLevel(ACTIVE_USER) >= 5) {
                const target = args[0];
                if (!target) {
                    addSystemMessage('Kullanım: /addadmin kullanıcı');
                    return;
                }
                
                const user = USERS_DB.find(u => u.name === target);
                if (user) {
                    user.role = 'admin';
                    localStorage.setItem('cetcety_users', JSON.stringify(USERS_DB));
                    
                    await database.ref('onlineUsers/' + target).update({ role: 'admin' });
                    
                    addSystemMessage(`✅ ${target} admin yapıldı!`);
                } else {
                    addSystemMessage(`❌ ${target} bulunamadı.`);
                }
                return;
            }
            
            // ADDCOADMIN
            if (main === 'addcoadmin' && PermissionManager.getUserLevel(ACTIVE_USER) >= 4) {
                const target = args[0];
                const channel = args[1]?.replace('#', '') || currentChannel;
                
                if (!target) {
                    addSystemMessage('Kullanım: /addcoadmin kullanıcı [#kanal]');
                    return;
                }
                
                if (!channels[channel]) {
                    addSystemMessage(`❌ #${channel} kanalı bulunamadı.`);
                    return;
                }
                
                if (!channels[channel].coAdmins) channels[channel].coAdmins = [];
                if (!channels[channel].coAdmins.includes(target)) {
                    channels[channel].coAdmins.push(target);
                }
                
                addSystemMessage(`✅ ${target} #${channel} kanalında co-admin yapıldı!`);
                return;
            }
            
            // ADDOPERATOR
            if (main === 'addoperator' && PermissionManager.getUserLevel(ACTIVE_USER) >= 3) {
                const target = args[0];
                const channel = args[1]?.replace('#', '') || currentChannel;
                
                if (!target) {
                    addSystemMessage('Kullanım: /addoperator kullanıcı [#kanal]');
                    return;
                }
                
                if (!channels[channel]) {
                    addSystemMessage(`❌ #${channel} kanalı bulunamadı.`);
                    return;
                }
                
                if (!channels[channel].operators) channels[channel].operators = [];
                if (!channels[channel].operators.includes(target)) {
                    channels[channel].operators.push(target);
                }
                
                addSystemMessage(`✅ ${target} #${channel} kanalında operator yapıldı!`);
                return;
            }
            
            // USERS
            if (main === 'users') {
                const list = channels[currentChannel]?.onlineUsers?.join(', ') || 'Kimse yok';
                addSystemMessage(`👥 Çevrimiçi: ${list}`);
                return;
            }
            
            // KANAL
            if (main === 'kanal') {
                const ch = channels[currentChannel];
                addSystemMessage(`📢 #${currentChannel} • ${ch?.onlineUsers?.length || 0} çevrimiçi • Sahip: ${ch?.owner}`);
                return;
            }
            
            addSystemMessage(`❌ Bilinmeyen komut: /${main}`);
        }

        // ============= PANEL FONKSİYONLARI =============
        function loadLeftPanel(panelName) {
            const panel = document.getElementById('leftPanel');
            let html = '';
            
            if (panelName === 'subscriptions') {
                html = `<div class="panel-header"><h3><i class="fas fa-bell"></i> Abonelikler</h3><span class="subscription-count">${ACTIVE_USER?.subscribedChannels?.length || 0}</span><div class="panel-close" onclick="closeLeftPanel()"><i class="fas fa-times"></i></div></div>
                <div class="panel-content">
                    ${ACTIVE_USER?.subscribedChannels?.map(ch => `
                        <div class="subscription-item ${ch === currentChannel ? 'active' : ''}" onclick="joinChannel('${ch}')">
                            <div class="subscription-avatar"><i class="fas fa-hashtag"></i></div>
                            <div class="subscription-info">
                                <div class="subscription-name">${escapeHTML(ch)}</div>
                                <div class="subscription-meta">${channels[ch]?.onlineUsers?.length || 0} çevrimiçi</div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
            
            if (panelName === 'channels') {
                const channelList = Object.values(channels).filter(ch => !ch.isHidden || PermissionManager.getUserLevel(ACTIVE_USER) >= 4);
                html = `<div class="panel-header"><h3><i class="fas fa-list-ul"></i> Kanallar</h3><span class="subscription-count">${channelList.length}</span><div class="panel-close" onclick="closeLeftPanel()"><i class="fas fa-times"></i></div></div>
                <div class="panel-content">
                    ${channelList.map(ch => `
                        <div class="channel-item" onclick="joinChannel('${ch.name}')">
                            <div class="channel-avatar"><i class="fas fa-hashtag"></i></div>
                            <div class="channel-info">
                                <div class="channel-name">${escapeHTML(ch.name)}</div>
                                <div class="channel-meta">${ch.onlineUsers?.length || 0} çevrimiçi</div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
            
            if (panelName === 'chatlist') {
                html = `<div class="panel-header"><h3><i class="fas fa-comment"></i> Sohbetler</h3><span class="subscription-count">0</span><div class="panel-close" onclick="closeLeftPanel()"><i class="fas fa-times"></i></div></div>
                <div class="panel-content">
                    <div style="color:#aaa; padding:16px; text-align:center;">Yakında...</div>
                </div>`;
            }
            
            if (panelName === 'profile') {
                html = `<div class="panel-header"><h3><i class="fas fa-user"></i> Profil</h3><div class="panel-close" onclick="closeLeftPanel()"><i class="fas fa-times"></i></div></div>
                <div class="panel-content">
                    <div style="text-align:center; margin-bottom:20px;">
                        <div class="profile-avatar-panel" style="width:80px; height:80px; border-radius:50%; background:#ff0000; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:32px;">
                            ${ACTIVE_USER?.avatar || ACTIVE_USER?.name?.charAt(0).toUpperCase() || '?'}
                        </div>
                        <h2>${escapeHTML(ACTIVE_USER?.name || '')}</h2>
                        <span class="badge badge-${ACTIVE_USER?.role}">${PermissionManager.getRoleIcon(ACTIVE_USER?.role)} ${ACTIVE_USER?.role}</span>
                    </div>
                    <button class="form-button" style="width:100%;" onclick="logout()">Çıkış Yap</button>
                </div>`;
            }
            
            panel.innerHTML = html;
        }

        function openSubscriptions() { loadLeftPanel('subscriptions'); }
        function openChannelPanel() { loadLeftPanel('channels'); }
        function openChatListPanel() { loadLeftPanel('chatlist'); }
        function openProfilePanel() { loadLeftPanel('profile'); }
        function closeLeftPanel() { document.getElementById('leftPanel').classList.remove('active'); }

        async function joinChannel(ch) {
            if (!channels[ch]) return;
            currentChannel = ch;
            document.getElementById('currentChannelName').textContent = ch;
            document.getElementById('messages').innerHTML = '<div class="system-message"><i class="fas fa-info-circle"></i> Kanala katıldın.</div>';
            
            database.ref('messages').orderByChild('channel').equalTo(ch).off();
            setupRealtimeListeners();
            
            await updateOnlineStatus();
            addSystemMessage(`📢 #${ch} kanalına katıldın.`);
            closeLeftPanel();
        }

        function toggleChannelSubscribe() {
            // Basit abonelik mantığı
            addSystemMessage('🔜 Abonelik sistemi yakında...');
        }

        // ============= YOUTUBE =============
        function initYouTubePlayer() {
            if (!document.getElementById('youtubeContainer') || !channels[currentChannel]) return;
            
            try {
                ytPlayer = new YT.Player('youtubeContainer', {
                    height: '100%', width: '100%',
                    videoId: channels[currentChannel]?.youtube?.currentVideo || 'QKEHXrDVBF8',
                    playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0 },
                    events: {
                        onReady: (event) => { ytPlayerReady = true; event.target.playVideo(); },
                        onStateChange: (event) => { if (event.data === YT.PlayerState.ENDED) playNextVideo(); }
                    }
                });
            } catch (e) { console.log('YouTube hatası:', e); }
        }

        function onYouTubeIframeAPIReady() { initYouTubePlayer(); }

        function playNextVideo() {
            const c = channels[currentChannel];
            if (!c?.youtube?.playlist?.length) return;
            const currentIndex = c.youtube.playlist.findIndex(v => v.id === c.youtube.currentVideo);
            const next = c.youtube.playlist[(currentIndex + 1) % c.youtube.playlist.length];
            if (next && ytPlayer) { ytPlayer.loadVideoById(next.id); }
        }

        // ============= UI GÜNCELLEME =============
        function updateUIForUser() {
            if (!ACTIVE_USER) return;
            document.getElementById('avatarText').textContent = ACTIVE_USER.avatar || ACTIVE_USER.name.charAt(0).toUpperCase();
        }

        function updateConnectionStatus(status, text) {
            const el = document.getElementById('connectionStatus');
            const txt = document.getElementById('statusText');
            if (el && txt) {
                el.className = `connection-status ${status}`;
                txt.textContent = text;
            }
        }

        // ============= ÇIKIŞ =============
        async function logout() {
            if (ACTIVE_USER && database) {
                await database.ref('onlineUsers/' + ACTIVE_USER.name).remove();
            }
            localStorage.removeItem('cetcety_active_user');
            ACTIVE_USER = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginOverlay').classList.remove('hidden');
        }

        // ============= BAŞLAT =============
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            
            // Kayıtlı kullanıcı varsa otomatik giriş yap
            const savedUser = JSON.parse(localStorage.getItem('cetcety_active_user'));
            if (savedUser) {
                ACTIVE_USER = savedUser;
                // Firebase hazır olunca giriş yap
                const checkAuth = setInterval(() => {
                    if (auth?.currentUser) {
                        clearInterval(checkAuth);
                        ACTIVE_USER.firebaseUid = auth.currentUser.uid;
                        document.getElementById('loginOverlay').classList.add('hidden');
                        document.getElementById('app').style.display = 'flex';
                        
                        if (Object.keys(channels).length === 0) {
                            channels = { 'genel': { name: 'genel', owner: 'MateKy', ownerRole: 'owner', coAdmins: [], operators: [], subscribers: 1, online: 1, topic: 'Genel sohbet', onlineUsers: [], youtube: { currentVideo: 'QKEHXrDVBF8', currentTitle: 'Crispy Concords', currentArtist: 'MateKy', playlist: [] } } };
                        }
                        
                        setupRealtimeListeners();
                        updateOnlineStatus();
                        loadLeftPanel('subscriptions');
                        updateUIForUser();
                        addSystemMessage(`👋 Hoş geldin, ${ACTIVE_USER.name}!`);
                    }
                }, 500);
            }
        });
    </script>
</body>
</html>
