<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Popbox Music - Çok Kanallı Medya</title>
    <!-- FIREBASE SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simple-peer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-panel: #1a1a1a;
            --bg-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #6c757d;
            --accent: #00ff9d;
            --accent-hover: #00cc7d;
            --danger: #ff4d4d;
            --warning: #ffaa00;
            --success: #00cc66;
            --info: #00aaff;
            --border-color: #333333;
            --owner-color: #ffaa00;
            --admin-color: #00aaff;
            --coadmin-color: #00ff9d;
            --operator-color: #ff8800;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-panel);
        }

        *::-webkit-scrollbar {
            width: 6px;
        }

        *::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 3px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SOL İKON PANELİ - %5 */
        .left-panel {
            width: 5%;
            min-width: 60px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .icon-wrapper {
            position: relative;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            font-size: 20px;
        }

        .icon-wrapper:hover {
            background: var(--bg-hover);
            color: var(--accent);
            transform: scale(1.1);
        }

        .icon-wrapper.active {
            color: var(--accent);
            background: var(--bg-hover);
        }

        .icon-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid var(--bg-secondary);
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--info));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .profile-avatar:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* SAĞ PANEL - %10 */
        .right-panel {
            width: 10%;
            min-width: 150px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            right: 35%;
            top: 0;
            z-index: 90;
            transition: all 0.3s ease;
            overflow-y: auto;
            display: none;
        }

        .right-panel.active {
            display: block;
        }

        .right-panel-header {
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right-panel-content {
            padding: 15px;
        }

        .list-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            background: var(--bg-panel);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            background: var(--bg-hover);
            transform: translateX(5px);
        }

        .list-item.active {
            border-left: 3px solid var(--accent);
        }

        /* ORTA PANEL - %50 */
        .center-panel {
            width: 50%;
            margin-left: 5%;
            margin-right: 35%;
            height: 100vh;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-badge {
            background: var(--accent);
            color: black;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.own {
            align-self: flex-end;
            background: var(--accent);
            color: black;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: var(--bg-panel);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .message-sender {
            font-weight: 600;
            color: var(--accent);
        }

        .message-time {
            color: var(--text-muted);
        }

        .message-content {
            word-break: break-word;
        }

        .message-image, .message-video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .chat-input-area {
            padding: 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            max-height: 120px;
            outline: none;
        }

        #message-input:focus {
            border-color: var(--accent);
        }

        .attach-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: var(--accent-hover);
        }

        /* SAĞ VİDEO PANELİ - %35 */
        .video-panel {
            width: 35%;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: black;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .video-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .video-btn:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        .playlist-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            background: var(--bg-panel);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .playlist-item:hover {
            background: var(--bg-hover);
        }

        .playlist-item.active {
            border-left: 3px solid var(--accent);
        }

        .playlist-thumb {
            width: 40px;
            height: 40px;
            background: var(--bg-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODALLAR */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            z-index: 1000;
            max-width: 400px;
            width: 90%;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .modal.active {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-input {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .modal-input:focus {
            border-color: var(--accent);
        }

        .modal-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: var(--accent);
            color: black;
        }

        .modal-btn.primary:hover {
            background: var(--accent-hover);
        }

        .modal-btn.danger {
            background: var(--danger);
            color: white;
        }

        .modal-btn.secondary {
            background: var(--bg-panel);
            color: var(--text-primary);
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: none;
            backdrop-filter: blur(5px);
        }

        .overlay.active {
            display: block;
        }

        /* WEBRTC */
        .webrtc-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            z-index: 1000;
            display: none;
        }

        .webrtc-container.active {
            display: block;
        }

        .webrtc-video {
            width: 100%;
            border-radius: 12px 12px 0 0;
        }

        .webrtc-controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .left-panel {
                width: 60px;
            }

            .right-panel {
                right: 0;
                width: 250px;
            }

            .center-panel {
                margin-left: 60px;
                margin-right: 0;
                width: calc(100% - 60px);
            }

            .video-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- SOL İKON PANELİ (%5) -->
    <div class="left-panel">
        <div class="profile-avatar" id="profileAvatar" onclick="toggleProfilePanel()">
            👤
        </div>

        <div class="icon-wrapper" id="notificationIcon" onclick="togglePanel('notifications')">
            🔔
            <span class="icon-badge" id="notificationBadge" style="display: none;">0</span>
        </div>

        <div class="icon-wrapper" id="onlineIcon" onclick="togglePanel('online')">
            👥
            <span class="icon-badge" id="onlineBadge">0</span>
        </div>

        <div class="icon-wrapper" id="channelsIcon" onclick="togglePanel('channels')">
            📺
        </div>

        <div class="icon-wrapper" id="subscriptionsIcon" onclick="togglePanel('subscriptions')">
            ⭐
        </div>
    </div>

    <!-- SAĞ PANEL (%10) -->
    <div class="right-panel" id="rightPanel">
        <!-- Dinamik içerik JS ile doldurulacak -->
    </div>

    <!-- ORTA PANEL (%50) -->
    <div class="center-panel">
        <div class="chat-header">
            <div class="chat-info">
                <span id="currentChannelName">#genel</span>
                <span class="chat-badge" id="channelRole"></span>
            </div>
            <div id="channelMembers">0 üye</div>
        </div>

        <div class="messages-area" id="messages"></div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <button class="attach-btn" onclick="openAttachMenu()">📎</button>
                <textarea 
                    id="message-input" 
                    placeholder="Mesajınızı yazın..."
                    rows="1"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- SAĞ VİDEO PANELİ (%35) -->
    <div class="video-panel">
        <div class="video-container">
            <div id="youtube-player"></div>
            <div class="video-overlay">
                <button class="video-btn" onclick="addToPlaylist()" title="Playlist'e Ekle" id="addToPlaylistBtn" style="display: none;">➕</button>
                <button class="video-btn" onclick="reportChannel()" title="Kanalı Şikayet Et">⚠️</button>
                <button class="video-btn" onclick="hideChannel()" title="Kanalı Gizle">👁️</button>
            </div>
        </div>

        <div class="playlist-section">
            <div class="playlist-header">
                <span>📋 Oynatma Listesi</span>
                <button class="video-btn" onclick="clearPlaylist()" style="width: auto; padding: 5px 10px; border-radius: 20px;" id="clearPlaylistBtn" style="display: none;">Temizle</button>
            </div>
            <div id="playlist"></div>
        </div>
    </div>

    <!-- MODALLAR -->
    <!-- Profil Modal -->
    <div class="modal" id="profileModal">
        <div class="modal-header">
            <span class="modal-title">Profil</span>
            <button class="close-btn" onclick="closeModal('profileModal')">×</button>
        </div>
        <div class="modal-body">
            <div style="display: flex; justify-content: center; margin-bottom: 20px;">
                <div class="profile-avatar" style="width: 80px; height: 80px; font-size: 40px;" id="profileAvatarLarge">
                    👤
                </div>
            </div>
            <button class="modal-btn secondary" onclick="openCreateChannelModal()">📺 Kanal Aç</button>
            <button class="modal-btn secondary" onclick="openChangeAvatarModal()">🖼️ Profil Resmi Değiştir</button>
            <button class="modal-btn secondary" onclick="openRegisterModal()">📝 Nick Kayıt</button>
            <button class="modal-btn secondary" onclick="openChangePasswordModal()">🔐 Şifre Değiştir</button>
            <button class="modal-btn secondary" onclick="openPrivateBlockModal()">🚫 Özel Sohbete Kapat</button>
            <button class="modal-btn primary" onclick="openSupportModal()">📞 Destek Mesajı</button>
            <button class="modal-btn danger" onclick="logout()">🚪 Çıkış Yap</button>
        </div>
    </div>

    <!-- Kayıt Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-header">
            <span class="modal-title">Nick Kayıt</span>
            <button class="close-btn" onclick="closeModal('registerModal')">×</button>
        </div>
        <div class="modal-body">
            <input type="password" class="modal-input" id="registerPassword" placeholder="Şifre">
            <input type="password" class="modal-input" id="registerPasswordConfirm" placeholder="Şifre Tekrar">
            <button class="modal-btn primary" onclick="registerUser()">Kayıt Ol</button>
        </div>
    </div>

    <!-- Destek Modal -->
    <div class="modal" id="supportModal">
        <div class="modal-header">
            <span class="modal-title">Destek Talebi</span>
            <button class="close-btn" onclick="closeModal('supportModal')">×</button>
        </div>
        <div class="modal-body">
            <textarea class="modal-input" id="supportMessage" placeholder="Sorununuzu yazın..." rows="5"></textarea>
            <button class="modal-btn primary" onclick="sendSupportTicket()">Gönder</button>
        </div>
    </div>

    <!-- Kanal Aç Modal -->
    <div class="modal" id="createChannelModal">
        <div class="modal-header">
            <span class="modal-title">Kanal Aç</span>
            <button class="close-btn" onclick="closeModal('createChannelModal')">×</button>
        </div>
        <div class="modal-body">
            <input type="text" class="modal-input" id="channelName" placeholder="Kanal adı">
            <button class="modal-btn primary" onclick="createChannel()">Kanalı Aç</button>
        </div>
    </div>

    <!-- WebRTC Container -->
    <div class="webrtc-container" id="webrtcContainer">
        <video class="webrtc-video" id="remoteVideo" autoplay playsinline></video>
        <div class="webrtc-controls">
            <button class="video-btn" onclick="endWebRTC()" style="background: var(--danger);">❌</button>
            <button class="video-btn" onclick="toggleWebRTCAudio()">🎤</button>
            <button class="video-btn" onclick="toggleWebRTCVideo()">📹</button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <script>
        // ========== FIREBASE KONFİG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCrn_tXJZCAlKhem45aXxj4f0h26EPOQ70",
            authDomain: "popboxmusicchat.firebaseapp.com",
            databaseURL: "https://popboxmusicchat-default-rtdb.firebaseio.com",
            projectId: "popboxmusicchat",
            storageBucket: "popboxmusicchat.firebasestorage.app",
            messagingSenderId: "206625719024",
            appId: "1:206625719024:web:d28f478a2c96d10412f835"
        };

        // ========== GLOBAL DEĞİŞKENLER ==========
        let database;
        let currentUser = null;
        let currentChannel = 'genel';
        let isOwner = false;
        let isAdmin = false;
        let channels = {};
        let notifications = [];
        let notificationCount = 0;
        let onlineCount = 0;
        let subscriptions = {};
        let activePanel = null;
        let playlist = [];
        let player;
        let webRTC = null;
        let webRTCStream = null;
        let webRTCPeer = null;

        // ========== FIREBASE BAŞLAT ==========
        function initializeFirebase() {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            
            database.ref('.info/connected').on('value', (snap) => {
                if (snap.val()) {
                    console.log('✅ Firebase bağlantısı kuruldu');
                    initUser();
                }
            });
        }

        // ========== KULLANICI BAŞLAT ==========
        async function initUser() {
            const savedUser = localStorage.getItem('popbox_user');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                const valid = await checkUserExists(userData.name, userData.password);
                if (valid) {
                    currentUser = userData;
                    updateUIForUser();
                    loadChannels();
                    loadSubscriptions();
                    return;
                }
            }
            
            // Guest girişi
            const guestName = 'guest_' + Math.random().toString(36).substr(2, 6);
            currentUser = {
                name: guestName,
                isRegistered: false,
                role: 'user'
            };
            localStorage.setItem('popbox_user', JSON.stringify(currentUser));
            updateUIForUser();
            loadChannels();
        }

        async function checkUserExists(name, password) {
            const snapshot = await database.ref('users/' + name).once('value');
            const user = snapshot.val();
            if (user && user.passwordHash === await sha256(password)) {
                return user;
            }
            return null;
        }

        // ========== KANAL SİSTEMİ ==========
        function loadChannels() {
            database.ref('channels').on('value', (snapshot) => {
                channels = snapshot.val() || {};
                if (!channels.genel) {
                    // Varsayılan kanalı oluştur
                    database.ref('channels/genel/info').set({
                        name: 'genel',
                        owner: 'system',
                        createdAt: Date.now()
                    });
                }
                updateChannelsList();
            });
        }

        function switchChannel(channelName) {
            currentChannel = channelName;
            document.getElementById('currentChannelName').textContent = '#' + channelName;
            
            // Kanal yetkilerini kontrol et
            const channelInfo = channels[channelName]?.info || {};
            const memberRole = channels[channelName]?.members?.[currentUser.name];
            
            let role = 'user';
            if (isOwner) role = 'owner';
            else if (isAdmin) role = 'admin';
            else if (memberRole) role = memberRole;
            
            document.getElementById('channelRole').textContent = role;
            
            // Playlist butonlarını göster/gizle
            const canEditPlaylist = isOwner || isAdmin || role === 'coadmin' || role === 'operator';
            document.getElementById('addToPlaylistBtn').style.display = canEditPlaylist ? 'flex' : 'none';
            document.getElementById('clearPlaylistBtn').style.display = canEditPlaylist ? 'flex' : 'none';
            
            // Mesajları yükle
            loadMessages();
            
            // Online listeyi güncelle
            updateOnlineUsers();
            
            // Playlist'i yükle
            loadPlaylist();
        }

        function updateChannelsList() {
            if (activePanel === 'channels') {
                const content = document.querySelector('.right-panel-content');
                if (!content) return;
                
                let html = '';
                Object.keys(channels).forEach(channel => {
                    const isActive = channel === currentChannel;
                    const memberCount = channels[channel]?.onlineUsers ? 
                        Object.keys(channels[channel].onlineUsers || {}).length : 0;
                    
                    html += `
                        <div class="list-item ${isActive ? 'active' : ''}" onclick="switchChannel('${channel}')">
                            <div style="font-weight: 600;">#${channel}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">${memberCount} üye</div>
                        </div>
                    `;
                });
                content.innerHTML = html;
            }
        }

        // ========== MESAJ SİSTEMİ ==========
        function loadMessages() {
            database.ref(`channels/${currentChannel}/messages`).limitToLast(100).on('value', (snapshot) => {
                const messages = snapshot.val() || {};
                displayMessages(messages);
            });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            const sorted = Object.entries(messages)
                .sort(([,a], [,b]) => a.timestamp - b.timestamp);
            
            sorted.forEach(([id, msg]) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.sender === currentUser.name ? 'own' : 'other'}`;
                
                let content = msg.text || '';
                if (msg.image) {
                    content += `<br><img src="${msg.image}" class="message-image" onclick="showImage('${msg.image}')">`;
                }
                if (msg.video) {
                    content += `<br><video src="${msg.video}" class="message-video" controls></video>`;
                }
                
                messageDiv.innerHTML = `
                    <div class="message-header">
                        <span class="message-sender">${msg.sender}</span>
                        <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-content">${content}</div>
                `;
                
                container.appendChild(messageDiv);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;
            
            if (text.startsWith('/')) {
                handleCommand(text);
                input.value = '';
                return;
            }
            
            const message = {
                sender: currentUser.name,
                text: text,
                timestamp: Date.now(),
                role: currentUser.role
            };
            
            await database.ref(`channels/${currentChannel}/messages`).push(message);
            input.value = '';
            autoResize(input);
        }

        // ========== KOMUT SİSTEMİ ==========
        async function handleCommand(cmd) {
            const parts = cmd.substring(1).split(' ');
            const command = parts[0].toLowerCase();
            const args = parts.slice(1);

            switch(command) {
                case 'register':
                    openModal('registerModal');
                    break;
                    
                case 'kanal-ac':
                    openModal('createChannelModal');
                    break;
                    
                case 'coadmin':
                    if (!checkChannelPermission('coadmin')) return;
                    if (args[0]) {
                        await database.ref(`channels/${currentChannel}/members/${args[0]}`).set('coadmin');
                        addSystemMessage(`✅ ${args[0]} artık co-admin`);
                    }
                    break;
                    
                case 'operator':
                    if (!checkChannelPermission('coadmin')) return;
                    if (args[0]) {
                        await database.ref(`channels/${currentChannel}/members/${args[0]}`).set('operator');
                        addSystemMessage(`✅ ${args[0]} artık operator`);
                    }
                    break;
                    
                case 'playlist-ekle':
                    if (!checkChannelPermission('operator')) return;
                    if (args[0]) {
                        addToPlaylist(args[0]);
                    }
                    break;
                    
                case 'yardım':
                case 'help':
                    showHelp();
                    break;
                    
                default:
                    addSystemMessage('❌ Bilinmeyen komut');
            }
        }

        function checkChannelPermission(requiredRole) {
            if (isOwner || isAdmin) return true;
            
            const userRole = channels[currentChannel]?.members?.[currentUser.name];
            const roles = { 'coadmin': 3, 'operator': 2, 'user': 1 };
            const required = roles[requiredRole] || 1;
            const user = roles[userRole] || 1;
            
            if (user >= required) return true;
            
            addSystemMessage('⛔ Bu komut için yetkiniz yok');
            return false;
        }

        // ========== KANAL OLUŞTURMA ==========
        async function createChannel() {
            const channelName = document.getElementById('channelName').value.trim().toLowerCase();
            
            if (!channelName) {
                alert('Kanal adı girin');
                return;
            }
            
            if (channels[channelName]) {
                alert('Bu kanal zaten var');
                return;
            }
            
            if (!currentUser.isRegistered) {
                alert('Kanal açmak için kayıt olmalısınız');
                return;
            }
            
            await database.ref(`channels/${channelName}/info`).set({
                name: channelName,
                owner: currentUser.name,
                createdAt: Date.now()
            });
            
            await database.ref(`channels/${channelName}/members/${currentUser.name}`).set('coadmin');
            
            closeModal('createChannelModal');
            switchChannel(channelName);
            addSystemMessage(`✅ ${channelName} kanalı açıldı!`);
        }

        // ========== ABONELİK SİSTEMİ ==========
        function loadSubscriptions() {
            if (!currentUser.isRegistered) return;
            
            database.ref(`users/${currentUser.name}/subscriptions`).on('value', (snapshot) => {
                subscriptions = snapshot.val() || {};
                updateSubscriptionsList();
            });
        }

        function toggleSubscribe(channelName) {
            if (!currentUser.isRegistered) {
                alert('Abone olmak için kayıt olmalısınız');
                return;
            }
            
            const ref = database.ref(`users/${currentUser.name}/subscriptions/${channelName}`);
            if (subscriptions[channelName]) {
                ref.remove();
                addSystemMessage(`📺 ${channelName} kanalından abonelikten çıkıldı`);
            } else {
                ref.set(true);
                addSystemMessage(`📺 ${channelName} kanalına abone olundu`);
            }
        }

        function updateSubscriptionsList() {
            if (activePanel === 'subscriptions') {
                const content = document.querySelector('.right-panel-content');
                if (!content) return;
                
                let html = '';
                Object.keys(subscriptions).forEach(channel => {
                    html += `
                        <div class="list-item" onclick="switchChannel('${channel}')">
                            <div style="font-weight: 600;">#${channel}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">Abone olundu</div>
                        </div>
                    `;
                });
                
                if (Object.keys(subscriptions).length === 0) {
                    html = '<div style="color: var(--text-muted); text-align: center;">Henüz abone olunan kanal yok</div>';
                }
                
                content.innerHTML = html;
            }
        }

        // ========== ONLINE KULLANICILAR ==========
        function updateOnlineUsers() {
            const userRef = database.ref(`channels/${currentChannel}/onlineUsers/${currentUser.name}`);
            userRef.set({
                name: currentUser.name,
                lastSeen: Date.now(),
                role: currentUser.role
            });
            userRef.onDisconnect().remove();
            
            database.ref(`channels/${currentChannel}/onlineUsers`).on('value', (snapshot) => {
                const users = snapshot.val() || {};
                onlineCount = Object.keys(users).length;
                document.getElementById('onlineBadge').textContent = onlineCount;
                
                if (activePanel === 'online') {
                    updateOnlineList(users);
                }
            });
        }

        function updateOnlineList(users) {
            const content = document.querySelector('.right-panel-content');
            if (!content) return;
            
            let html = '';
            Object.values(users).forEach(user => {
                html += `
                    <div class="list-item" onclick="openPrivateChat('${user.name}')">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
                            <span>${user.name}</span>
                            ${user.role !== 'user' ? `<span style="color: var(--accent); font-size: 10px;">${user.role}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            
            if (Object.keys(users).length === 0) {
                html = '<div style="color: var(--text-muted); text-align: center;">Kanalda kimse yok</div>';
            }
            
            content.innerHTML = html;
        }

        // ========== ÖZEL SOHBET ==========
        function openPrivateChat(username) {
            if (username === currentUser.name) return;
            
            const chatId = generateChatId(currentUser.name, username);
            
            // WebRTC butonu ekle
            const message = `🔒 Özel sohbet başlatıldı. Görüntülü konuşma için tıklayın: [📹 Görüntülü Ara]`;
            addSystemMessage(message);
            
            // WebRTC başlatma seçeneği
            if (confirm(`${username} ile görüntülü görüşme başlatmak ister misiniz?`)) {
                startWebRTC(username);
            }
        }

        // ========== WEBRTC ==========
        async function startWebRTC(targetUser) {
            try {
                webRTCStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                document.getElementById('remoteVideo').srcObject = webRTCStream;
                document.getElementById('webrtcContainer').classList.add('active');
                
                // Sinyal gönder
                const signalRef = database.ref(`calls/${targetUser}`);
                signalRef.set({
                    caller: currentUser.name,
                    offer: true,
                    timestamp: Date.now()
                });
                
            } catch (err) {
                console.error('WebRTC hatası:', err);
                alert('Kamera/ mikrofon erişimi yok');
            }
        }

        function endWebRTC() {
            if (webRTCStream) {
                webRTCStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('webrtcContainer').classList.remove('active');
        }

        // ========== PLAYLIST SİSTEMİ ==========
        function loadPlaylist() {
            database.ref(`channels/${currentChannel}/playlist`).on('value', (snapshot) => {
                playlist = snapshot.val() || [];
                updatePlaylist();
            });
        }

        function updatePlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            
            playlist.forEach((video, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.onclick = () => playVideo(video.id);
                
                item.innerHTML = `
                    <div class="playlist-thumb">🎬</div>
                    <div style="flex: 1;">
                        <div>Video ${index + 1}</div>
                        <div style="font-size: 10px; color: var(--text-muted);">${video.id}</div>
                    </div>
                    ${checkChannelPermission('operator') ? `
                        <button class="video-btn" onclick="event.stopPropagation(); removeFromPlaylist(${index})" style="width: 24px; height: 24px;">✖</button>
                    ` : ''}
                `;
                
                container.appendChild(item);
            });
        }

        async function addToPlaylist(videoId = null) {
            if (!videoId) {
                videoId = prompt('YouTube Video ID girin:');
            }
            
            if (videoId) {
                playlist.push({ id: videoId, addedBy: currentUser.name, addedAt: Date.now() });
                await database.ref(`channels/${currentChannel}/playlist`).set(playlist);
                addSystemMessage(`✅ Video playlist'e eklendi`);
            }
        }

        async function removeFromPlaylist(index) {
            playlist.splice(index, 1);
            await database.ref(`channels/${currentChannel}/playlist`).set(playlist);
        }

        async function clearPlaylist() {
            if (confirm('Playlist temizlensin mi?')) {
                playlist = [];
                await database.ref(`channels/${currentChannel}/playlist`).set(playlist);
            }
        }

        function playVideo(videoId) {
            if (player) {
                player.loadVideoById(videoId);
            }
        }

        // ========== YOUTUBE PLAYER ==========
        function initYouTubePlayer() {
            player = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: 'i75BZYOAPl4',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.ENDED && playlist.length > 0) {
                            // Sonraki videoyu oynat
                            const currentIndex = playlist.findIndex(v => v.id === player.getVideoData().video_id);
                            if (currentIndex !== -1 && currentIndex < playlist.length - 1) {
                                playVideo(playlist[currentIndex + 1].id);
                            }
                        }
                    }
                }
            });
        }

        // ========== DESTEK SİSTEMİ ==========
        function openSupportModal() {
            document.getElementById('supportModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        async function sendSupportTicket() {
            const message = document.getElementById('supportMessage').value.trim();
            
            if (!message) return;
            
            const ticket = {
                user: currentUser.name,
                message: message,
                timestamp: Date.now(),
                status: 'open'
            };
            
            await database.ref('supportTickets').push(ticket);
            
            // Destek kanalına bildirim
            await database.ref('channels/destek/messages').push({
                sender: 'system',
                text: `📞 Yeni destek talebi: ${currentUser.name} - ${message.substring(0, 50)}...`,
                timestamp: Date.now(),
                type: 'system'
            });
            
            closeModal('supportModal');
            addSystemMessage('✅ Destek talebiniz iletildi');
        }

        // ========== KAYIT SİSTEMİ ==========
        async function registerUser() {
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerPasswordConfirm').value;
            
            if (password !== confirm) {
                alert('Şifreler eşleşmiyor');
                return;
            }
            
            const passwordHash = await sha256(password);
            
            await database.ref(`users/${currentUser.name}`).set({
                name: currentUser.name,
                passwordHash: passwordHash,
                registeredAt: Date.now(),
                isRegistered: true
            });
            
            currentUser.isRegistered = true;
            currentUser.role = 'user';
            localStorage.setItem('popbox_user', JSON.stringify(currentUser));
            
            closeModal('registerModal');
            addSystemMessage('✅ Başarıyla kayıt oldunuz!');
        }

        // ========== PANEL YÖNETİMİ ==========
        function togglePanel(panelName) {
            const panel = document.getElementById('rightPanel');
            const content = panel.querySelector('.right-panel-content');
            
            if (!content) {
                const newContent = document.createElement('div');
                newContent.className = 'right-panel-content';
                panel.appendChild(newContent);
            }
            
            let headerText = '';
            switch(panelName) {
                case 'notifications':
                    headerText = 'Bildirimler';
                    updateNotificationsPanel();
                    break;
                case 'online':
                    headerText = 'Online Kullanıcılar';
                    updateOnlineList(channels[currentChannel]?.onlineUsers || {});
                    break;
                case 'channels':
                    headerText = 'Kanallar';
                    updateChannelsList();
                    break;
                case 'subscriptions':
                    headerText = 'Abonelikler';
                    updateSubscriptionsList();
                    break;
            }
            
            panel.querySelector('.right-panel-header')?.remove();
            const header = document.createElement('div');
            header.className = 'right-panel-header';
            header.innerHTML = `
                <span>${headerText}</span>
                <button class="close-btn" onclick="closePanel()">×</button>
            `;
            panel.prepend(header);
            
            panel.classList.add('active');
            activePanel = panelName;
        }

        function closePanel() {
            document.getElementById('rightPanel').classList.remove('active');
            activePanel = null;
        }

        function toggleProfilePanel() {
            document.getElementById('profileModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.classList.remove('active');
            });
            document.getElementById('overlay').classList.remove('active');
            closePanel();
        }

        // ========== BİLDİRİMLER ==========
        function addNotification(title, message) {
            notificationCount++;
            notifications.unshift({ title, message, time: Date.now() });
            
            const badge = document.getElementById('notificationBadge');
            badge.textContent = notificationCount;
            badge.style.display = 'flex';
            
            if (activePanel === 'notifications') {
                updateNotificationsPanel();
            }
        }

        function updateNotificationsPanel() {
            const content = document.querySelector('.right-panel-content');
            if (!content) return;
            
            let html = '';
            notifications.slice(0, 20).forEach(notif => {
                html += `
                    <div class="list-item">
                        <div style="font-weight: 600;">${notif.title}</div>
                        <div style="font-size: 12px;">${notif.message}</div>
                        <div style="font-size: 10px; color: var(--text-muted);">${new Date(notif.time).toLocaleTimeString()}</div>
                    </div>
                `;
            });
            
            if (notifications.length === 0) {
                html = '<div style="color: var(--text-muted); text-align: center;">Bildirim yok</div>';
            }
            
            content.innerHTML = html;
        }

        // ========== YARDIMCI FONKSİYONLAR ==========
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function generateChatId(user1, user2) {
            const users = [user1, user2].sort();
            return `chat_${users[0]}_${users[1]}`;
        }

        function addSystemMessage(text) {
            const container = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.innerHTML = text;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showHelp() {
            const help = `
                <strong>📚 KOMUTLAR:</strong><br><br>
                /register - Kayıt ol<br>
                /kanal-ac - Kanal aç<br>
                /coadmin [kullanıcı] - Co-admin ata<br>
                /operator [kullanıcı] - Operatör ata<br>
                /playlist-ekle [videoID] - Playlist'e video ekle<br>
                /yardım - Bu menü
            `;
            addSystemMessage(help);
        }

        function updateUIForUser() {
            if (currentUser.name === 'MateKy') {
                isOwner = true;
                document.title = '🤴 Popbox Music - Owner';
            }
            
            const admins = ['popbox', 'popboxmusic'];
            if (admins.includes(currentUser.name)) {
                isAdmin = true;
            }
        }

        // ========== EVENT LISTENER'LAR ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllModals();
            }
        });

        // ========== BAŞLAT ==========
        window.onload = () => {
            initializeFirebase();
            
            // YouTube API
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.body.appendChild(tag);
        };

        window.onYouTubeIframeAPIReady = initYouTubePlayer;
    </script>
</body>
</html>
