<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Haberler · Türkiye</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #202124;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #dadce0;
            padding: 8px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #202124;
            font-size: 22px;
            font-weight: 500;
        }

        .logo i {
            color: #1a73e8;
        }

        .search-box {
            background: #f1f3f4;
            border-radius: 24px;
            padding: 10px 20px;
            width: 300px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box input {
            background: transparent;
            border: none;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .search-box i {
            color: #5f6368;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            color: #5f6368;
        }

        /* Ana Menü */
        .main-menu {
            max-width: 1280px;
            margin: 0 auto;
            padding: 12px 24px 0;
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #dadce0;
            overflow-x: auto;
            background: white;
        }

        .menu-item {
            color: #5f6368;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0 12px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }

        .menu-item.active {
            color: #1a73e8;
            border-bottom-color: #1a73e8;
        }

        /* Konum ve Hava */
        .location-bar {
            max-width: 1280px;
            margin: 16px auto 0;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: #5f6368;
            font-size: 14px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #dadce0;
        }

        /* Ana Grid */
        .main-grid {
            max-width: 1280px;
            margin: 24px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 32px;
        }

        /* Haber Kartları */
        .featured-card {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .featured-image {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            background-color: #f1f3f4;
        }

        .featured-content {
            padding: 20px;
        }

        .source-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .source-name {
            color: #1a73e8;
            font-weight: 500;
            font-size: 13px;
        }

        .time {
            color: #5f6368;
            font-size: 13px;
        }

        .featured-title {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .featured-title a {
            color: #202124;
            text-decoration: none;
        }

        .featured-description {
            color: #5f6368;
            font-size: 14px;
        }

        /* Haber Grid */
        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .news-card {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #dadce0;
            text-decoration: none;
        }

        .news-card:last-child {
            border-bottom: none;
        }

        .news-content {
            padding-right: 16px;
        }

        .news-source {
            color: #1a73e8;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .news-title {
            color: #202124;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .news-description {
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .news-meta {
            color: #5f6368;
            font-size: 12px;
        }

        .news-image {
            width: 180px;
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            background-color: #f1f3f4;
        }

        /* Sidebar */
        .sidebar-card {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .sidebar-title {
            color: #202124;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #dadce0;
        }

        .list-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #dadce0;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-image {
            width: 80px;
            height: 60px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            background-color: #f1f3f4;
        }

        .list-content {
            flex: 1;
        }

        .list-title {
            color: #202124;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .list-source {
            color: #5f6368;
            font-size: 12px;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #dadce0;
            margin-top: 40px;
            padding: 30px 24px;
            background: white;
        }

        .footer-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5f6368;
            text-decoration: none;
            font-size: 12px;
        }

        .loader {
            text-align: center;
            padding: 60px;
            color: #5f6368;
        }

        /* Mobil */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .search-box {
                width: 100%;
                order: 3;
            }
            .news-card {
                grid-template-columns: 1fr;
            }
            .news-image {
                width: 100%;
                height: 180px;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <i class="fas fa-bars menu-icon"></i>
                <a href="#" class="logo" id="logoLink">
                    <i class="fas fa-newspaper"></i>
                    <span>Google Haberler</span>
                </a>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Haberlerde ara" id="searchInput">
            </div>

            <div class="header-icons">
                <i class="far fa-bell"></i>
                <i class="far fa-user-circle"></i>
            </div>
        </div>
    </header>

    <!-- Ana Menü -->
    <div class="main-menu" id="mainMenu">
        <span class="menu-item active" data-cat="hepsi">Başlıklar</span>
        <span class="menu-item" data-cat="turkiye">Türkiye</span>
        <span class="menu-item" data-cat="dunya">Dünya</span>
        <span class="menu-item" data-cat="ekonomi">Ekonomi</span>
        <span class="menu-item" data-cat="spor">Spor</span>
        <span class="menu-item" data-cat="teknoloji">Teknoloji</span>
        <span class="menu-item" data-cat="bilim">Bilim</span>
        <span class="menu-item" data-cat="saglik">Sağlık</span>
    </div>

    <!-- Konum ve Hava -->
    <div class="location-bar">
        <span><i class="fas fa-map-marker-alt" style="color: #1a73e8;"></i> Türkiye</span>
        <div class="weather" id="weatherWidget">
            <i class="fas fa-cloud-sun"></i>
            <span id="temperature">18°C</span>
            <span>İstanbul</span>
        </div>
    </div>

    <!-- Ana İçerik -->
    <div id="haberler" class="main-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Haberler yükleniyor...</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">Hakkında</a>
                <a href="#">Gizlilik</a>
                <a href="#">Şartlar</a>
                <a href="#">Yardım</a>
            </div>
            <div>
                <i class="fab fa-android" style="color:#5f6368; margin-right:16px;"></i>
                <i class="fab fa-apple" style="color:#5f6368;"></i>
            </div>
        </div>
    </footer>

    <script>
    // ===========================================
    // GERÇEK HABERLER - RSS2JSON API ile
    // ===========================================
    const API_URL = 'https://api.rss2json.com/v1/api.json';
    
    const KATEGORILER = {
        hepsi: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr',
        turkiye: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr',
        dunya: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=w',
        ekonomi: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=ec',
        spor: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=sp',
        teknoloji: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=tc',
        bilim: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=snc',
        saglik: 'https://news.google.com/rss?hl=tr&gl=TR&ceid=TR:tr&topic=m'
    };

    let tumHaberler = [];
    let aktifKategori = 'hepsi';
    let aramaTerm = '';

    // Hava durumu
    function havaDurumu() {
        const sicaklik = Math.floor(Math.random() * 10) + 12;
        document.getElementById('temperature').textContent = sicaklik + '°C';
    }

    // Haberleri çek
    async function haberleriCek() {
        tumHaberler = [];
        
        document.getElementById('haberler').innerHTML = 
            '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Haberler yükleniyor...</div>';
        
        try {
            const rssUrl = KATEGORILER[aktifKategori];
            const url = `${API_URL}?rss_url=${encodeURIComponent(rssUrl)}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.status === 'ok' && data.items) {
                data.items.forEach((item, index) => {
                    let kaynak = item.author || 'Google News';
                    let baslik = item.title;
                    
                    if (baslik && baslik.includes(' - ')) {
                        const parts = baslik.split(' - ');
                        kaynak = parts[0].trim();
                        baslik = parts.slice(1).join(' - ').trim();
                    }
                    
                    tumHaberler.push({
                        title: baslik,
                        link: item.link,
                        description: item.description?.replace(/<[^>]*>/g, '').substring(0, 150) + '...' || 'Haberi okumak için tıklayın',
                        source: kaynak,
                        time: new Date(item.pubDate),
                        image: `https://picsum.photos/400/200?random=${index}`,
                        category: aktifKategori
                    });
                });
                
                tumHaberler.sort((a, b) => b.time - a.time);
                haberleriGoster();
            }
        } catch (error) {
            console.log('Haber çekilemedi, demo haberler gösteriliyor');
            demoHaberler();
        }
    }

    // Demo haberler (API çalışmazsa)
    function demoHaberler() {
        tumHaberler = [
            {
                title: "Cumhurbaşkanı Erdoğan yeni kabineyi açıkladı",
                source: "Anadolu Ajansı",
                description: "Cumhurbaşkanı Erdoğan, kabine değişikliğini duyurdu. Yeni bakanlar yemin ederek göreve başladı.",
                time: new Date(),
                image: "https://picsum.photos/800/400?random=1",
                link: "#"
            },
            {
                title: "Merkez Bankası faiz kararını açıkladı",
                source: "Bloomberg HT",
                description: "Merkez Bankası politika faizini yüzde 45'te sabit tuttu. Karar metninde enflasyon vurgusu yapıldı.",
                time: new Date(),
                image: "https://picsum.photos/800/400?random=2",
                link: "#"
            },
            {
                title: "Galatasaray - Fenerbahçe derbisi nefes kesti",
                source: "Fanatik",
                description: "Süper Lig'de oynanan derbi 2-2 sona erdi. Maçta tartışmalı pozisyonlar yaşandı.",
                time: new Date(),
                image: "https://picsum.photos/800/400?random=3",
                link: "#"
            },
            {
                title: "Asgari ücrete ara zam gelecek mi?",
                source: "NTV",
                description: "Asgari Ücret Tespit Komisyonu temmuz ayında toplanacak. Yeni rakam merakla bekleniyor.",
                time: new Date(),
                image: "https://picsum.photos/800/400?random=4",
                link: "#"
            },
            {
                title: "iPhone 15 Türkiye fiyatı belli oldu",
                source: "Webtekno",
                description: "Apple'ın yeni amiral gemisi iPhone 15'in Türkiye fiyatı 49.999 TL olarak açıklandı.",
                time: new Date(),
                image: "https://picsum.photos/800/400?random=5",
                link: "#"
            }
        ];
        haberleriGoster();
    }

    // Haberleri göster
    function haberleriGoster() {
        let gosterilecek = tumHaberler;
        
        if (aramaTerm.length > 2) {
            gosterilecek = tumHaberler.filter(h => 
                h.title.toLowerCase().includes(aramaTerm) || 
                h.description.toLowerCase().includes(aramaTerm)
            );
        }
        
        if (gosterilecek.length === 0) {
            document.getElementById('haberler').innerHTML = 
                '<div style="grid-column:1/-1; text-align:center; padding:60px;">Sonuç bulunamadı</div>';
            return;
        }

        const manset = gosterilecek[0];
        const anaHaberler = gosterilecek.slice(1, 7);
        const yanHaberler = gosterilecek.slice(7, 12);

        let html = `
            <div class="left-column">
                <!-- Manset -->
                <div class="featured-card">
                    <div class="featured-image" style="background-image: url('${manset.image}');"></div>
                    <div class="featured-content">
                        <div class="source-row">
                            <span class="source-name">${manset.source}</span>
                            <span class="time">• ${manset.time.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <h2 class="featured-title"><a href="${manset.link}" target="_blank">${manset.title}</a></h2>
                        <div class="featured-description">${manset.description}</div>
                    </div>
                </div>

                <div class="news-grid">
        `;

        anaHaberler.forEach(h => {
            html += `
                <a href="${h.link}" target="_blank" class="news-card">
                    <div class="news-content">
                        <div class="news-source">${h.source}</div>
                        <div class="news-title">${h.title.length > 70 ? h.title.substring(0,70)+'...' : h.title}</div>
                        <div class="news-description">${h.description}</div>
                        <div class="news-meta">${h.time.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                    <div class="news-image" style="background-image: url('${h.image}');"></div>
                </a>
            `;
        });

        html += `
                </div>
            </div>
            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-title">Popüler Haberler</div>
        `;

        yanHaberler.slice(0, 5).forEach(h => {
            html += `
                <div class="list-item">
                    <div class="list-image" style="background-image: url('${h.image}');"></div>
                    <div class="list-content">
                        <div class="list-title">${h.title.substring(0, 40)}...</div>
                        <div class="list-source">${h.source}</div>
                    </div>
                </div>
            `;
        });

        html += `
                </div>
            </div>
        `;

        document.getElementById('haberler').innerHTML = html;
    }

    // Event listeners
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            aktifKategori = this.dataset.cat;
            haberleriCek();
        });
    });

    document.getElementById('logoLink').addEventListener('click', function(e) {
        e.preventDefault();
        aktifKategori = 'hepsi';
        aramaTerm = '';
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        document.querySelector('.menu-item:first-child').classList.add('active');
        haberleriCek();
    });

    document.getElementById('searchInput').addEventListener('keyup', function() {
        aramaTerm = this.value.toLowerCase();
        if (aramaTerm.length > 2 || aramaTerm.length === 0) {
            haberleriGoster();
        }
    });

    // Başlangıç
    haberleriCek();
    setInterval(havaDurumu, 60000);
    havaDurumu();
    </script>
</body>
</html>
