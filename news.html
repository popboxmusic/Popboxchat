<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>cetnews · canlı haber · piyasalar</title>
    <!-- Deepseek minimal teması + canlı veri -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Deepseek'in saf minimalist karanlık teması */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            line-height: 1.6;
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        /* Minimal scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f1f1f;
            padding: 10px 24px;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 26px;
            font-weight: 450;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-decoration: none;
        }

        .logo span {
            color: #6c6c6c;
            font-weight: 300;
        }

        /* Canlı piyasa ticker - yeni! */
        .market-ticker {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 13px;
            color: #d0d0d0;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticker-item i {
            font-size: 12px;
            color: #6c6c6c;
        }

        .ticker-value {
            font-weight: 500;
            color: #ffffff;
        }

        .ticker-change {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .change-positive { background: #1e3a2e; color: #4caf92; }
        .change-negative { background: #3a2e2e; color: #ff7b7b; }

        .nav {
            display: flex;
            gap: 28px;
        }

        .nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            cursor: pointer;
        }

        .nav a:hover, .nav a.active {
            color: #ffffff;
            border-bottom-color: #6c6c6c;
        }

        .search-box {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            width: 260px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #e5e5e5;
            width: 100%;
            font-size: 13px;
            outline: none;
        }

        .search-box input::placeholder {
            color: #5a5a5a;
        }

        .search-box i {
            color: #5a5a5a;
            margin-right: 8px;
            font-size: 12px;
        }

        /* Kategori bar */
        .categories {
            max-width: 1400px;
            margin: 16px auto 0;
            padding: 0 24px 8px;
            display: flex;
            gap: 32px;
            font-size: 13px;
            color: #7c7c7c;
            border-bottom: 1px solid #1f1f1f;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .categories span {
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .categories span:hover {
            color: #ffffff;
        }

        .categories span.active {
            color: #ffffff;
            border-bottom-color: #7c7c7c;
        }

        /* Ana grid */
        .main-grid {
            max-width: 1400px;
            margin: 28px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* Featured haber */
        .featured {
            background-color: #121212;
            border: 1px solid #1f1f1f;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: border-color 0.2s;
        }

        .featured:hover {
            border-color: #3a3a3a;
        }

        .featured-image {
            height: 320px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            position: relative;
        }

        .featured-content {
            padding: 26px;
        }

        .featured-tag {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            color: #a0a0a0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .live-badge {
            background: #8b000030;
            color: #ff8a8a;
            border: 1px solid #8b0000;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
        }

        .featured-title {
            font-size: 30px;
            font-weight: 450;
            line-height: 1.3;
            margin-bottom: 14px;
        }

        .featured-title a {
            color: white;
            text-decoration: none;
        }

        .featured-meta {
            display: flex;
            gap: 25px;
            color: #7c7c7c;
            font-size: 13px;
        }

        /* Haber grid */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .news-card {
            background: #121212;
            border: 1px solid #1f1f1f;
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .news-card:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .card-image {
            height: 170px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
        }

        .card-content {
            padding: 18px;
        }

        .card-source {
            color: #7c7c7c;
            font-size: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 450;
            line-height: 1.4;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .card-time {
            color: #5a5a5a;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Sidebar kartlar */
        .sidebar-card {
            background: #121212;
            border: 1px solid #1f1f1f;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 450;
            color: #ffffff;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title span {
            color: #6c6c6c;
            font-size: 11px;
        }

        /* Piyasa grid */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .market-item {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #2a2a2a;
        }

        .market-label {
            color: #8a8a8a;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .market-price {
            font-size: 18px;
            font-weight: 500;
            color: white;
            margin-bottom: 4px;
        }

        .market-detail {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .son-dakika-item {
            padding: 14px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .son-dakika-item:last-child {
            border-bottom: none;
        }

        .sonDakika-link {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .sonDakika-link:hover {
            color: white;
        }

        .meta {
            color: #6c6c6c;
            font-size: 11px;
            display: flex;
            gap: 16px;
        }

        .footer {
            border-top: 1px solid #1f1f1f;
            margin-top: 60px;
            padding: 30px 24px 20px;
            color: #6c6c6c;
            font-size: 12px;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: #6c6c6c;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: white;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: #6c6c6c;
        }

        @media (max-width: 1000px) {
            .market-ticker {
                display: none;
            }
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }
            .nav {
                justify-content: center;
            }
            .search-box {
                width: 100%;
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
            .market-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo" id="logoLink">cet<span>news</span></a>
            
            <!-- Canlı piyasa ticker (gerçek zamanlı güncellenecek) -->
            <div class="market-ticker" id="ticker">
                <div class="ticker-item"><i class="fas fa-dollar-sign"></i> USD <span class="ticker-value" id="usdTicker">33.45</span> <span class="ticker-change change-positive" id="usdChange">+0.12%</span></div>
                <div class="ticker-item"><i class="fas fa-euro-sign"></i> EUR <span class="ticker-value" id="eurTicker">36.78</span> <span class="ticker-change change-negative" id="eurChange">-0.08%</span></div>
                <div class="ticker-item"><i class="fas fa-coins"></i> ALTIN <span class="ticker-value" id="goldTicker">2,456</span> <span class="ticker-change change-positive" id="goldChange">+0.35%</span></div>
                <div class="ticker-item"><i class="fab fa-bitcoin"></i> BTC <span class="ticker-value" id="btcTicker">58,240</span> <span class="ticker-change change-positive" id="btcChange">+1.24%</span></div>
            </div>

            <div class="nav" id="navMenu">
                <a class="active" data-category="hepsi">hepsi</a>
                <a data-category="gündem">gündem</a>
                <a data-category="dünya">dünya</a>
                <a data-category="ekonomi">ekonomi</a>
                <a data-category="siyaset">siyaset</a>
                <a data-category="teknoloji">teknoloji</a>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="haberlerde ara..." id="searchInput">
            </div>
        </div>
    </header>

    <div class="categories" id="subCategories">
        <span class="active">son dakika</span>
        <span>türkiye</span>
        <span>dünya</span>
        <span>ekonomi</span>
        <span>siyaset</span>
        <span>spor</span>
        <span>sanat</span>
        <span>bilim</span>
    </div>

    <!-- Haberlerin yükleneceği ana alan -->
    <div id="haberler" class="main-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> canlı haberler yükleniyor...</div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div>© 2026 cetnews — anlık piyasa & haber</div>
            <div class="footer-links">
                <a href="#">gizlilik</a>
                <a href="#">kullanım</a>
                <a href="#">iletişim</a>
                <a href="#">reklam</a>
                <a href="#">sss</a>
            </div>
        </div>
    </footer>

    <script>
    // --- CANLI PİYASA VERİLERİ (gerçek zamanlı simülasyon) ---
    function piyasaGuncelle() {
        // Rastgele ama gerçekçi fiyat hareketleri
        const usd = (33.10 + Math.random() * 1.2).toFixed(2);
        const eur = (36.20 + Math.random() * 1.4).toFixed(2);
        const gold = (2350 + Math.random() * 200).toFixed(0);
        const btc = (54000 + Math.random() * 8000).toFixed(0);
        
        const usdCh = (Math.random() * 1.5 - 0.3).toFixed(2);
        const eurCh = (Math.random() * 1.5 - 0.7).toFixed(2);
        const goldCh = (Math.random() * 1.2 - 0.2).toFixed(2);
        const btcCh = (Math.random() * 3 - 1).toFixed(2);
        
        $('#usdTicker').text(usd);
        $('#eurTicker').text(eur);
        $('#goldTicker').text(Number(gold).toLocaleString());
        $('#btcTicker').text(Number(btc).toLocaleString());
        
        function setChange(el, val) {
            const sign = val >= 0 ? '+' : '';
            $(el).text(sign + val + '%').removeClass('change-positive change-negative').addClass(val >= 0 ? 'change-positive' : 'change-negative');
        }
        
        setChange('#usdChange', usdCh);
        setChange('#eurChange', eurCh);
        setChange('#goldChange', goldCh);
        setChange('#btcChange', btcCh);
    }
    
    // Her 10 saniyede bir güncelle
    piyasaGuncelle();
    setInterval(piyasaGuncelle, 10000);

    // --- HABER KAYNAKLARI (gerçek RSS'ler, görseller garantili) ---
    const haberKaynaklari = [
        { url: 'https://feeds.bbci.co.uk/turkce/rss.xml', name: 'BBC Türkçe', cat: 'dünya', icon: '🌍' },
        { url: 'https://www.cnnturk.com/feed/rss/all/news', name: 'CNN Türk', cat: 'gündem', icon: '🇹🇷' },
        { url: 'https://www.ntv.com.tr/gundem.rss', name: 'NTV', cat: 'gündem', icon: '🇹🇷' },
        { url: 'http://rss.cnn.com/rss/edition.rss', name: 'CNN Int', cat: 'dünya', icon: '🌍' },
        { url: 'https://feeds.reuters.com/reuters/topNews', name: 'Reuters', cat: 'dünya', icon: '🌍' },
        { url: 'https://feeds.bloomberg.com/markets/news.rss', name: 'Bloomberg', cat: 'ekonomi', icon: '📈' },
        { url: 'https://www.hurriyet.com.tr/rss/anasayfa', name: 'Hürriyet', cat: 'gündem', icon: '🇹🇷' },
        { url: 'https://www.milliyet.com.tr/rss/rssNew/gundemRss.xml', name: 'Milliyet', cat: 'siyaset', icon: '🇹🇷' },
        { url: 'https://techcrunch.com/feed/', name: 'TechCrunch', cat: 'teknoloji', icon: '💻' },
        { url: 'https://www.theverge.com/rss/index.xml', name: 'The Verge', cat: 'teknoloji', icon: '📱' }
    ];

    let tumHaberler = [];
    let yuklenenKaynak = 0;

    function haberleriYukle() {
        tumHaberler = [];
        yuklenenKaynak = 0;
        
        haberKaynaklari.forEach(kaynak => {
            const proxy = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(kaynak.url);
            
            $.ajax({
                url: proxy,
                method: 'GET',
                dataType: 'json',
                timeout: 8000,
                success: function(data) {
                    if (data.status === 'ok' && data.items) {
                        data.items.slice(0, 12).forEach((item, index) => {
                            // GÖRSEL ÇÖZÜMÜ - her haber için görsel garantisi
                            let image = item.thumbnail || item.enclosure?.link;
                            
                            // Eğer görsel yoksa, haberin kendi içindeki ilk resmi bul
                            if (!image || image === '' || !image.startsWith('http')) {
                                const imgMatch = item.description.match(/<img[^>]+src="([^">]+)"/);
                                if (imgMatch && imgMatch[1]) {
                                    image = imgMatch[1];
                                }
                            }
                            
                            // Hala yoksa, konuya göre anlamlı bir görsel (Unsplash)
                            if (!image || image === '' || !image.startsWith('http')) {
                                const topics = ['news', 'politics', 'business', 'technology', 'world'];
                                const topic = topics[index % topics.length];
                                image = `https://source.unsplash.com/600x400/?${topic}&${index}${Date.now()}`;
                            }
                            
                            tumHaberler.push({
                                title: item.title || 'Haber başlığı',
                                link: item.link || '#',
                                description: item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...' : 'Haberi okumak için tıklayın...',
                                pubDate: new Date(item.pubDate || Date.now()),
                                source: kaynak.name,
                                category: kaynak.cat,
                                icon: kaynak.icon,
                                image: image
                            });
                        });
                    }
                    yuklenenKaynak++;
                    if (yuklenenKaynak === haberKaynaklari.length) {
                        renderHaberler('hepsi');
                    }
                },
                error: function() {
                    yuklenenKaynak++;
                    if (yuklenenKaynak === haberKaynaklari.length) {
                        renderHaberler('hepsi');
                    }
                }
            });
        });
    }

    // --- RENDER FONKSİYONU (kategoriye göre filtrele) ---
    function renderHaberler(kategori = 'hepsi') {
        $('#haberler').html('<div class="loader"><i class="fas fa-spinner fa-pulse"></i> haberler güncelleniyor...</div>');
        
        setTimeout(() => {
            if (tumHaberler.length === 0) {
                $('#haberler').html('<div style="grid-column:1/-1; text-align:center; padding:60px;">haber kaynaklarına ulaşılamıyor · yeniden dene</div>');
                return;
            }

            // Tarihe göre sırala
            tumHaberler.sort((a, b) => b.pubDate - a.pubDate);
            
            // Kategori filtreleme
            let filtrelenmis = kategori === 'hepsi' ? tumHaberler : tumHaberler.filter(h => h.category === kategori);
            
            // Eğer filtre sonucu azsa, diğerlerinden ekle
            if (filtrelenmis.length < 12) {
                const ekstra = tumHaberler.filter(h => h.category !== kategori).slice(0, 12 - filtrelenmis.length);
                filtrelenmis = [...filtrelenmis, ...ekstra];
            }
            
            // Tekrar sırala
            filtrelenmis.sort((a, b) => b.pubDate - a.pubDate);
            
            const haberler = filtrelenmis.slice(0, 40);
            const manset = haberler[0];
            const gridHaberler = haberler.slice(1, 9);
            const sonDakika = haberler.slice(9, 19);
            const ekonomiHaber = haberler.filter(h => h.category === 'ekonomi').slice(0, 4);

            let html = `
                <!-- Sol sütun -->
                <div class="left-column">
                    <!-- Manşet -->
                    <div class="featured">
                        <div class="featured-image" style="background-image: linear-gradient(0deg, #0a0a0a 0%, transparent 70%), url('${manset.image}');"></div>
                        <div class="featured-content">
                            <div class="featured-tag">
                                <span>${manset.icon} ${manset.source}</span>
                                <span class="live-badge">son dakika</span>
                            </div>
                            <h2 class="featured-title"><a href="${manset.link}" target="_blank">${manset.title}</a></h2>
                            <p style="color:#b0b0b0; font-size:14px; margin-bottom:12px;">${manset.description}</p>
                            <div class="featured-meta">
                                <span><i class="far fa-clock"></i> ${manset.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                                <span><i class="far fa-calendar"></i> ${manset.pubDate.toLocaleDateString('tr-TR')}</span>
                                <span><i class="far fa-eye"></i> ${Math.floor(Math.random()*5000)+1000}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Haber grid -->
                    <div class="news-grid">
            `;

            gridHaberler.forEach(h => {
                html += `
                    <a href="${h.link}" target="_blank" class="news-card">
                        <div class="card-image" style="background-image: url('${h.image}');"></div>
                        <div class="card-content">
                            <div class="card-source"><i class="fas fa-circle" style="font-size:6px;"></i> ${h.icon} ${h.source}</div>
                            <h3 class="card-title">${h.title.length > 70 ? h.title.substring(0,70)+'...' : h.title}</h3>
                            <div class="card-time"><i class="far fa-clock"></i> ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    </a>
                `;
            });

            html += `
                    </div>
                </div>

                <!-- Sağ sütun -->
                <div class="sidebar">
                    <!-- CANLI PİYASALAR (tam kapsamlı) -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">canlı piyasalar <span>anlık</span></div>
                        <div class="market-grid" id="marketGrid">
                            <div class="market-item">
                                <div class="market-label"><i class="fas fa-dollar-sign"></i> USD/TRY</div>
                                <div class="market-price" id="usdPrice">33.42</div>
                                <div class="market-detail"><span id="usdChangeSmall">+0.14%</span> <span>günlük</span></div>
                            </div>
                            <div class="market-item">
                                <div class="market-label"><i class="fas fa-euro-sign"></i> EUR/TRY</div>
                                <div class="market-price" id="eurPrice">36.78</div>
                                <div class="market-detail"><span id="eurChangeSmall">-0.08%</span> <span>günlük</span></div>
                            </div>
                            <div class="market-item">
                                <div class="market-label"><i class="fas fa-coins"></i> GRAM ALTIN</div>
                                <div class="market-price" id="goldPrice">2,456</div>
                                <div class="market-detail"><span id="goldChangeSmall">+0.35%</span> <span>TL</span></div>
                            </div>
                            <div class="market-item">
                                <div class="market-label"><i class="fab fa-bitcoin"></i> BITCOIN</div>
                                <div class="market-price" id="btcPrice">$58,240</div>
                                <div class="market-detail"><span id="btcChangeSmall">+1.24%</span> <span>USD</span></div>
                            </div>
                            <div class="market-item">
                                <div class="market-label"><i class="fas fa-chart-line"></i> BIST 100</div>
                                <div class="market-price" id="bistPrice">9.845</div>
                                <div class="market-detail"><span id="bistChange">+0.87%</span> <span>hacim 45B</span></div>
                            </div>
                            <div class="market-item">
                                <div class="market-label"><i class="fas fa-oil-can"></i> BRENT</div>
                                <div class="market-price" id="oilPrice">$82.40</div>
                                <div class="market-detail"><span id="oilChange">-0.32%</span> <span>varil</span></div>
                            </div>
                        </div>
                    </div>

                    <!-- SON DAKİKA -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">son dakika <span>canlı</span></div>
                        ${sonDakika.slice(0,7).map(h => `
                            <div class="son-dakika-item">
                                <a href="${h.link}" target="_blank" class="sonDakika-link">${h.title.length > 60 ? h.title.substring(0,60)+'...' : h.title}</a>
                                <div class="meta"><span><i class="far fa-clock"></i> ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span> <span>${h.icon} ${h.source}</span></div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- EKONOMİ -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">ekonomi <span>piyasa haberi</span></div>
                        ${ekonomiHaber.map(h => `
                            <div class="son-dakika-item" style="padding:12px 0;">
                                <a href="${h.link}" target="_blank" class="sonDakika-link">${h.title.length > 60 ? h.title.substring(0,60)+'...' : h.title}</a>
                                <div class="meta">${h.icon} ${h.source} · ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            $('#haberler').html(html);
            
            // Piyasa verilerini güncelle
            piyasaGuncelle();
        }, 100);
    }

    // Kategori tıklamaları
    $('#navMenu a').click(function() {
        $('#navMenu a').removeClass('active');
        $(this).addClass('active');
        const cat = $(this).data('category');
        renderHaberler(cat);
    });

    $('#subCategories span').click(function() {
        $('#subCategories span').removeClass('active');
        $(this).addClass('active');
        // Alt kategori mantığı (basit)
        const cat = $(this).text().trim().toLowerCase();
        if (cat === 'son dakika') renderHaberler('hepsi');
        else if (cat === 'türkiye') renderHaberler('gündem');
        else if (cat === 'dünya') renderHaberler('dünya');
        else if (cat === 'ekonomi') renderHaberler('ekonomi');
        else if (cat === 'siyaset') renderHaberler('siyaset');
        else renderHaberler('hepsi');
    });

    // Arama
    $('#searchInput').on('keyup', function() {
        const term = $(this).val().toLowerCase();
        if (term.length < 3) return;
        
        const filtrelenmis = tumHaberler.filter(h => 
            h.title.toLowerCase().includes(term) || 
            h.description.toLowerCase().includes(term)
        );
        
        if (filtrelenmis.length > 0) {
            tumHaberler = filtrelenmis;
            renderHaberler('hepsi');
        }
    });

    // Logo tıklama - ana sayfa
    $('#logoLink').click(function(e) {
        e.preventDefault();
        haberleriYukle();
    });

    // İlk yükleme
    haberleriYukle();

    // 3 dakikada bir yenile
    setInterval(() => {
        haberleriYukle();
    }, 180000);
    </script>
</body>
</html>
