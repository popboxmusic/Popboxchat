<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cetnews · minimalist haber</title>
    <style>
        /* Deepseek.com'dan ilham alan minimalist karanlık tema */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            line-height: 1.6;
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        /* Minimal scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

        /* Header - Deepseek sadeliğinde */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #0a0a0a;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(10, 10, 10, 0.85);
            border-bottom: 1px solid #1f1f1f;
            padding: 12px 24px;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 450;
            letter-spacing: -0.3px;
            color: #ffffff;
            text-decoration: none;
        }

        .logo span {
            color: #7c7c7c;
            font-weight: 350;
        }

        .nav {
            display: flex;
            gap: 32px;
        }

        .nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
        }

        .nav a:hover {
            color: #ffffff;
            border-bottom-color: #505050;
        }

        .search-box {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            width: 240px;
            transition: border-color 0.2s;
        }

        .search-box:focus-within {
            border-color: #505050;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #e5e5e5;
            width: 100%;
            font-size: 13px;
            outline: none;
        }

        .search-box input::placeholder {
            color: #505050;
            font-weight: 300;
        }

        .search-box i {
            color: #505050;
            margin-right: 6px;
            font-size: 12px;
        }

        /* Kategori bar - minimal çizgiler */
        .categories {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px 8px;
            display: flex;
            gap: 28px;
            font-size: 13px;
            color: #7c7c7c;
            border-bottom: 1px solid #1a1a1a;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .categories span {
            cursor: default;
            padding-bottom: 8px;
            border-bottom: 1px solid transparent;
        }

        .categories span.active {
            color: #ffffff;
            border-bottom-color: #7c7c7c;
        }

        /* Ana grid - Deepseek'in ferah grid yapısı */
        .main-grid {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
        }

        /* Sol sütun */
        .featured {
            margin-bottom: 32px;
            background-color: #121212;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            transition: border-color 0.2s;
        }

        .featured:hover {
            border-color: #3a3a3a;
        }

        .featured-image {
            height: 300px;
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #1a1a1a;
        }

        .featured-content {
            padding: 24px;
        }

        .featured-tag {
            color: #a0a0a0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .featured-tag .live {
            color: #ff5e5e;
            font-size: 10px;
            border: 1px solid #ff5e5e20;
            background: #ff5e5e10;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .featured-title {
            font-size: 28px;
            font-weight: 450;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #ffffff;
            text-decoration: none;
        }

        .featured-title a {
            color: inherit;
            text-decoration: none;
        }

        .featured-meta {
            color: #7c7c7c;
            font-size: 13px;
            display: flex;
            gap: 20px;
        }

        /* Haber grid - minimalist kartlar */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .news-card {
            background-color: #121212;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .news-card:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .card-image {
            height: 160px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
        }

        .card-content {
            padding: 18px;
        }

        .card-source {
            color: #7c7c7c;
            font-size: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-source i {
            font-size: 10px;
            color: #505050;
        }

        .card-title {
            font-size: 17px;
            font-weight: 450;
            line-height: 1.4;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .card-time {
            color: #505050;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Sağ sütun */
        .sidebar-card {
            background-color: #121212;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 450;
            color: #ffffff;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title span {
            color: #7c7c7c;
            font-size: 11px;
            font-weight: 400;
        }

        .breaking-item {
            padding: 12px 0;
            border-bottom: 1px solid #1f1f1f;
        }

        .breaking-item:last-child {
            border-bottom: none;
        }

        .breaking-link {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            display: block;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .breaking-link:hover {
            color: #ffffff;
        }

        .breaking-meta {
            color: #7c7c7c;
            font-size: 11px;
            display: flex;
            gap: 16px;
        }

        .world-item {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1f1f1f;
        }

        .world-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .world-thumb {
            width: 90px;
            height: 60px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            flex-shrink: 0;
        }

        .world-content {
            flex: 1;
        }

        .world-link {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            display: block;
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .world-link:hover {
            color: #ffffff;
        }

        .world-source {
            color: #7c7c7c;
            font-size: 11px;
        }

        /* Footer minimal */
        .footer {
            border-top: 1px solid #1f1f1f;
            margin-top: 60px;
            padding: 32px 24px 24px;
            color: #7c7c7c;
            font-size: 12px;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links {
            display: flex;
            gap: 28px;
        }

        .footer-links a {
            color: #7c7c7c;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #ffffff;
        }

        /* Mobil */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .nav {
                display: none;
            }
            
            .search-box {
                width: 180px;
            }
            
            .categories {
                gap: 20px;
            }
        }

        @media (max-width: 600px) {
            .header-container {
                flex-wrap: wrap;
                gap: 12px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .news-grid {
                grid-template-columns: 1fr;
            }
            
            .featured-title {
                font-size: 22px;
            }
            
            .footer-container {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Loader */
        .loader {
            text-align: center;
            padding: 40px;
            color: #505050;
        }
    </style>
    <!-- Font Awesome (minimal ikonlar) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">cet<span>news</span></a>
            <div class="nav">
                <a href="#">gündem</a>
                <a href="#">dünya</a>
                <a href="#">ekonomi</a>
                <a href="#">teknoloji</a>
                <a href="#">spor</a>
                <a href="#">kültür</a>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="haberlerde ara...">
            </div>
        </div>
    </header>

    <div class="categories">
        <span class="active">son dakika</span>
        <span>türkiye</span>
        <span>dünya</span>
        <span>ekonomi</span>
        <span>siyaset</span>
        <span>spor</span>
        <span>sanat</span>
        <span>bilim</span>
        <span>yaşam</span>
    </div>

    <!-- Haberlerin yükleneceği ana alan -->
    <div id="haberler" class="main-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> haberler yükleniyor...</div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div>© 2026 cetnews — minimalist haber akışı</div>
            <div class="footer-links">
                <a href="#">gizlilik</a>
                <a href="#">kullanım</a>
                <a href="#">iletişim</a>
                <a href="#">kaynaklar</a>
                <a href="#">rss</a>
            </div>
        </div>
    </footer>

    <script>
    $(document).ready(function() {
        // Gerçek RSS kaynakları (CORS sorunsuz)
        const sources = [
            { url: 'https://feeds.bbci.co.uk/turkce/rss.xml', name: 'BBC Türkçe', cat: 'dünya', icon: '🌍' },
            { url: 'https://www.cnnturk.com/feed/rss/all/news', name: 'CNN Türk', cat: 'türkiye', icon: '🇹🇷' },
            { url: 'https://www.ntv.com.tr/gundem.rss', name: 'NTV', cat: 'türkiye', icon: '🇹🇷' },
            { url: 'http://rss.cnn.com/rss/edition.rss', name: 'CNN Int', cat: 'dünya', icon: '🌍' },
            { url: 'https://feeds.reuters.com/reuters/topNews', name: 'Reuters', cat: 'dünya', icon: '🌍' },
            { url: 'https://techcrunch.com/feed/', name: 'TechCrunch', cat: 'teknoloji', icon: '💻' }
        ];

        let tumHaberler = [];
        let tamamlanan = 0;

        // Her kaynaktan haber çek
        sources.forEach(kaynak => {
            const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(kaynak.url);
            
            $.ajax({
                url: proxyUrl,
                method: 'GET',
                dataType: 'json',
                timeout: 8000,
                success: function(data) {
                    if (data.status === 'ok' && data.items) {
                        data.items.slice(0, 8).forEach(item => {
                            // Görsel bul (yoksa placeholder)
                            let image = item.thumbnail || item.enclosure?.link;
                            if (!image || image === '') {
                                // Kategoriye göre renkli placeholder
                                const hue = kaynak.cat === 'türkiye' ? 0 : kaynak.cat === 'dünya' ? 200 : 120;
                                image = `https://via.placeholder.com/600x400/${hue}0a0a/${hue}0a0a?text=${kaynak.icon}`;
                            }
                            
                            tumHaberler.push({
                                title: item.title,
                                link: item.link,
                                description: item.description.replace(/<[^>]*>?/gm, '').substring(0, 140) + '...',
                                pubDate: new Date(item.pubDate),
                                source: kaynak.name,
                                category: kaynak.cat,
                                icon: kaynak.icon,
                                image: image
                            });
                        });
                    }
                    tamamlanan++;
                    if (tamamlanan === sources.length) {
                        renderHaberler();
                    }
                },
                error: function() {
                    tamamlanan++;
                    if (tamamlanan === sources.length) {
                        renderHaberler();
                    }
                }
            });
        });

        function renderHaberler() {
            if (tumHaberler.length === 0) {
                $('#haberler').html('<div style="grid-column:1/-1; text-align:center; padding:60px; color:#7c7c7c;">haber kaynaklarına ulaşılamıyor · yeniden dene</div>');
                return;
            }

            // Tarihe göre sırala (en yeni önce)
            tumHaberler.sort((a, b) => b.pubDate - a.pubDate);
            
            // İlk 40 haberi al
            const haberler = tumHaberler.slice(0, 40);
            
            // Manşet (en yeni haber)
            const manset = haberler[0];
            
            // Diğer haberler (2. ve 5. arası grid için)
            const gridHaberler = haberler.slice(1, 7);
            
            // Son dakika listesi (7-15 arası)
            const sonDakika = haberler.slice(7, 15);
            
            // Dünya haberleri (farklı kategorilerden)
            const dunyaHaberler = haberler.filter(h => h.category === 'dünya').slice(0, 4);

            // HTML oluştur
            let html = `
                <!-- Sol sütun -->
                <div class="left-column">
                    <!-- Manşet -->
                    <div class="featured">
                        <div class="featured-image" style="background-image: linear-gradient(0deg, #0a0a0a 0%, transparent 70%), url('${manset.image}');"></div>
                        <div class="featured-content">
                            <div class="featured-tag">
                                <span>${manset.icon} ${manset.source}</span>
                                <span class="live">son dakika</span>
                            </div>
                            <h2 class="featured-title"><a href="${manset.link}" target="_blank">${manset.title}</a></h2>
                            <p style="color: #a0a0a0; font-size: 14px; margin-bottom: 12px;">${manset.description}</p>
                            <div class="featured-meta">
                                <span><i class="far fa-clock" style="margin-right: 4px;"></i>${manset.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                                <span><i class="far fa-calendar"></i>${manset.pubDate.toLocaleDateString('tr-TR')}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Haber grid (2 sütun) -->
                    <div class="news-grid">
            `;
            
            // Grid haberleri
            gridHaberler.forEach(h => {
                html += `
                    <a href="${h.link}" target="_blank" class="news-card">
                        <div class="card-image" style="background-image: url('${h.image}');"></div>
                        <div class="card-content">
                            <div class="card-source">
                                <i class="fas fa-circle" style="font-size: 6px; color: #7c7c7c;"></i> ${h.icon} ${h.source}
                            </div>
                            <h3 class="card-title">${h.title.length > 70 ? h.title.substring(0,70)+'...' : h.title}</h3>
                            <div class="card-time">
                                <i class="far fa-clock"></i> ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}
                            </div>
                        </div>
                    </a>
                `;
            });

            html += `
                    </div>
                </div>

                <!-- Sağ sütun -->
                <div class="sidebar">
                    <!-- Son dakika listesi -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">
                            son dakika
                            <span>canlı</span>
                        </div>
            `;
            
            sonDakika.forEach(h => {
                html += `
                    <div class="breaking-item">
                        <a href="${h.link}" target="_blank" class="breaking-link">${h.title.length > 60 ? h.title.substring(0,60)+'...' : h.title}</a>
                        <div class="breaking-meta">
                            <span><i class="far fa-clock"></i> ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                            <span>${h.icon} ${h.source}</span>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>

                    <!-- Dünya gündemi -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">dünya gündemi</div>
            `;
            
            dunyaHaberler.forEach(h => {
                html += `
                    <div class="world-item">
                        <div class="world-thumb" style="background-image: url('${h.image}');"></div>
                        <div class="world-content">
                            <a href="${h.link}" target="_blank" class="world-link">${h.title.length > 50 ? h.title.substring(0,50)+'...' : h.title}</a>
                            <div class="world-source">
                                <i class="far fa-clock"></i> ${h.pubDate.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})} · ${h.source}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    
                    <!-- Hava durumu minimal -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">anlık</div>
                        <div style="display: flex; justify-content: space-between; color: #a0a0a0; font-size: 13px;">
                            <span><i class="fas fa-cloud-sun"></i> istanbul 14°</span>
                            <span><i class="fas fa-chart-line"></i> bist 100 9.845</span>
                            <span><i class="fas fa-dollar-sign"></i> usd 32.45</span>
                        </div>
                    </div>
                </div>
            `;

            $('#haberler').html(html);
            
            // 3 dakikada bir otomatik yenile
            setTimeout(() => {
                location.reload();
            }, 180000);
        }
    });
    </script>
</body>
</html>
