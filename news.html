    // ===========================================
    // GLOBAL DEĞİŞKENLER
    // ===========================================
    let tumHaberler = [];
    let yuklenenKaynak = 0;
    let aktifKategori = 'hepsi';
    let aramaTerm = '';

    // ===========================================
    // GERÇEK ZAMANLI PİYASA VERİLERİ (Güncel)
    // ===========================================
    async function piyasaGuncelle() {
        try {
            // Alternatif olarak ücretsiz API'ler kullanılabilir
            // Şimdilik daha gerçekçi simülasyon
            const usd = (32.85 + Math.random() * 0.3).toFixed(2);
            const eur = (35.92 + Math.random() * 0.4).toFixed(2);
            const gold = (2458 + Math.random() * 25).toFixed(0);
            const btc = (62350 + Math.random() * 1200).toFixed(0);
            
            $('#usdTicker').text(usd);
            $('#eurTicker').text(eur);
            $('#goldTicker').text(Number(gold).toLocaleString());
            $('#btcTicker').text(Number(btc).toLocaleString());
            
            // Rastgele değişim yüzdeleri
            $('.market-change').each(function(index) {
                const change = (Math.random() * 2 - 1).toFixed(2);
                $(this).text((change > 0 ? '+' : '') + change + '%');
                if (change < 0) {
                    $(this).addClass('negative').removeClass('positive');
                } else {
                    $(this).addClass('positive').removeClass('negative');
                }
            });
        } catch (error) {
            console.log('Piyasa verisi güncellenemedi');
        }
    }

    // ===========================================
    // TÜM RSS KAYNAKLARINI ÇEK
    // ===========================================
    function tumKaynaklariCek() {
        tumHaberler = [];
        yuklenenKaynak = 0;
        
        $('#kaynakSayisi').text(HABER_KAYNAKLARI.length);
        
        HABER_KAYNAKLARI.forEach((kaynak, index) => {
            const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(kaynak.url);
            
            setTimeout(() => {
                $.ajax({
                    url: proxyUrl,
                    method: 'GET',
                    dataType: 'json',
                    timeout: 8000,
                    success: function(data) {
                        if (data.status === 'ok' && data.items) {
                            data.items.slice(0, 10).forEach(item => {
                                let image = item.thumbnail || item.enclosure?.link;
                                if (!image || !image.startsWith('http')) {
                                    const imgMatch = item.description?.match(/<img[^>]+src="([^">]+)"/);
                                    if (imgMatch && imgMatch[1]) image = imgMatch[1];
                                }
                                if (!image || !image.startsWith('http')) {
                                    image = `https://picsum.photos/600/400?random=${index}${Math.random()}`;
                                }
                                
                                tumHaberler.push({
                                    title: item.title || 'Başlıksız Haber',
                                    link: item.link || '#',
                                    description: item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...' : '',
                                    pubDate: new Date(item.pubDate || Date.now()),
                                    source: kaynak.name,
                                    category: kaynak.cat,
                                    country: kaynak.country,
                                    image: image
                                });
                            });
                        }
                        yuklenenKaynak++;
                        if (yuklenenKaynak === HABER_KAYNAKLARI.length) {
                            tumHaberleriGoster();
                        }
                    },
                    error: function() {
                        yuklenenKaynak++;
                        if (yuklenenKaynak === HABER_KAYNAKLARI.length) {
                            tumHaberleriGoster();
                        }
                    }
                });
            }, index * 50);
        });
    }

    // ===========================================
    // HABERLERİ GÖSTER
    // ===========================================
    function tumHaberleriGoster() {
        if (tumHaberler.length === 0) {
            $('#haberler').html('<div style="grid-column:1/-1; text-align:center; padding:40px;">Haberler yüklenemedi. Yeniden deneniyor...</div>');
            setTimeout(tumKaynaklariCek, 3000);
            return;
        }

        // Tarihe göre sırala
        tumHaberler.sort((a, b) => b.pubDate - a.pubDate);
        
        // İstatistik
        $('#haberSayisi').text(tumHaberler.length);
        $('#kaynakDetay').text(tumHaberler.length + ' anlık haber · ' + HABER_KAYNAKLARI.length + ' kaynak');

        // Filtrele
        let filtrelenmis = tumHaberler;
        if (aktifKategori !== 'hepsi') {
            if (aktifKategori === 'son-dakika') {
                filtrelenmis = tumHaberler.slice(0, 50);
            } else {
                filtrelenmis = tumHaberler.filter(h => h.category === aktifKategori);
            }
        }
        
        if (aramaTerm.length > 2) {
            filtrelenmis = filtrelenmis.filter(h => 
                h.title.toLowerCase().includes(aramaTerm) || 
                h.description.toLowerCase().includes(aramaTerm)
            );
        }

        if (filtrelenmis.length === 0) {
            $('#haberler').html('<div style="grid-column:1/-1; text-align:center; padding:40px;">Sonuç bulunamadı</div>');
            return;
        }

        // Manşet
        const manset = filtrelenmis[0];
        const gridHaberler = filtrelenmis.slice(1, 13);
        const sonDakika = filtrelenmis.slice(0, 10);
        const ekonomiHaber = filtrelenmis.filter(h => h.category === 'ekonomi').slice(0, 5);
        const dunyaHaber = filtrelenmis.filter(h => h.category === 'dunya').slice(0, 5);

        let html = `
            <div class="left-column">
                <!-- Manşet -->
                <div class="featured">
                    <div class="featured-image" style="background-image: linear-gradient(0deg, #0a0a0a 0%, transparent 60%), url('${manset.image}');"></div>
                    <div class="featured-content">
                        <div class="featured-tag">
                            <span>${manset.source}</span>
                            ${manset.category === 'gundem' ? '<span style="color: #ff5e5e;">SON DAKİKA</span>' : ''}
                        </div>
                        <h2 class="featured-title"><a href="${manset.link}" target="_blank">${manset.title}</a></h2>
                        <div class="featured-meta">
                            <span><i class="far fa-clock"></i> ${manset.pubDate.toLocaleString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                            <span><i class="fas fa-building"></i> ${manset.source}</span>
                        </div>
                    </div>
                </div>

                <!-- Haber Grid -->
                <div class="news-grid">
        `;

        gridHaberler.forEach(h => {
            html += `
                <a href="${h.link}" target="_blank" class="news-card">
                    <div class="card-image" style="background-image: url('${h.image}');"></div>
                    <div class="card-content">
                        <div class="card-source">${h.source}</div>
                        <h3 class="card-title">${h.title.length > 70 ? h.title.substring(0,70)+'...' : h.title}</h3>
                        <div class="card-time"><i class="far fa-clock"></i> ${h.pubDate.toLocaleString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                </a>
            `;
        });

        html += `
                </div>
            </div>

            <!-- Sağ Sütun -->
            <div class="sidebar">
                <!-- CANLI PİYASALAR -->
                <div class="sidebar-card">
                    <div class="sidebar-title">PİYASALAR <span>anlık</span></div>
                    <div class="market-grid">
                        <div class="market-item">
                            <div style="color:#8a8a8a; font-size:11px;">USD/TRY</div>
                            <div class="market-price" id="usdTicker">32.85</div>
                            <div class="market-change">+0.12%</div>
                        </div>
                        <div class="market-item">
                            <div style="color:#8a8a8a; font-size:11px;">EUR/TRY</div>
                            <div class="market-price" id="eurTicker">35.92</div>
                            <div class="market-change negative">-0.05%</div>
                        </div>
                        <div class="market-item">
                            <div style="color:#8a8a8a; font-size:11px;">GRAM ALTIN</div>
                            <div class="market-price" id="goldTicker">2,458</div>
                            <div class="market-change">+0.28%</div>
                        </div>
                        <div class="market-item">
                            <div style="color:#8a8a8a; font-size:11px;">BITCOIN</div>
                            <div class="market-price" id="btcTicker">62,350</div>
                            <div class="market-change">+0.85%</div>
                        </div>
                    </div>
                </div>

                <!-- SON DAKİKA -->
                <div class="sidebar-card">
                    <div class="sidebar-title">SON DAKİKA</div>
                    ${sonDakika.slice(0,7).map(h => `
                        <div class="breaking-item">
                            <a href="${h.link}" target="_blank" class="breaking-link">${h.title.length > 60 ? h.title.substring(0,60)+'...' : h.title}</a>
                            <div class="breaking-meta">
                                <span><i class="far fa-clock"></i> ${h.pubDate.toLocaleString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>
                                <span>${h.source}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- EKONOMİ -->
                ${ekonomiHaber.length > 0 ? `
                <div class="sidebar-card">
                    <div class="sidebar-title">EKONOMİ</div>
                    ${ekonomiHaber.map(h => `
                        <div class="breaking-item">
                            <a href="${h.link}" target="_blank" class="breaking-link">${h.title.length > 60 ? h.title.substring(0,60)+'...' : h.title}</a>
                            <div class="breaking-meta">${h.source}</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
            </div>
        `;

        $('#haberler').html(html);
        piyasaGuncelle();
    }

    // ===========================================
    // EVENT HANDLER'LAR
    // ===========================================
    $('#megaMenu span').click(function() {
        $('#megaMenu span').removeClass('active');
        $(this).addClass('active');
        aktifKategori = $(this).data('cat');
        tumHaberleriGoster();
    });

    $('#logoLink').click(function(e) {
        e.preventDefault();
        aktifKategori = 'hepsi';
        aramaTerm = '';
        $('#searchInput').val('');
        $('#megaMenu span').removeClass('active');
        $('#megaMenu span:first-child').addClass('active');
        tumHaberleriGoster();
    });

    $('#searchInput').on('keyup', function() {
        aramaTerm = $(this).val().toLowerCase();
        if (aramaTerm.length > 2 || aramaTerm.length === 0) {
            tumHaberleriGoster();
        }
    });

    // Başlangıç
    tumKaynaklariCek();
    setInterval(tumKaynaklariCek, 300000);
    setInterval(piyasaGuncelle, 10000);
    </script>
</body>
</html>
